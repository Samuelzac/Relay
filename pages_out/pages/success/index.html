<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Relay — Success</title>
  <style>
    body{background:#000;color:#fff;font-family:system-ui;margin:0;padding:0}
    .wrap{max-width:820px;margin:0 auto;padding:16px}
    .card{margin-top:12px;padding:16px;border-radius:12px;background:rgba(255,255,255,.08)}
    .btn{display:inline-block;padding:12px 16px;background:#1976d2;border-radius:10px;color:#fff;text-decoration:none;margin-top:10px;cursor:pointer}
    .secondary{background:rgba(255,255,255,.2)}
    .muted{opacity:.8;font-size:13px}
    code{display:block;background:#111;padding:10px;border-radius:8px;margin-top:6px}
  </style>
</head>
<body>
<div class="wrap">
<h2>Payment successful</h2>

<div class="card">
<p><b>⚠️ It may take 1–2 minutes before your stream is ready to broadcast or watch.</b></p>
<p class="muted">Your stream is being prepared in the background.</p>
</div>

<div class="card">
<h3>Stream with OBS (Recommended)</h3>
<button class="btn" onclick="getToken()">Get OBS Token</button>

<div id="obs" style="display:none;margin-top:10px;">
<div class="muted">Server</div>
<code id="server"></code>

<div class="muted">Bearer Token</div>
<code id="token"></code>

<button class="btn secondary" onclick="copyAll()">Copy OBS Setup</button>

<p class="muted">In OBS → Settings → Stream → Service: WHIP</p>
</div>
</div>
</div>

<script>
const params = new URLSearchParams(location.search);
const eventId = params.get("event");
const key = params.get("key") || "";

async function getToken(){
  const res = await fetch(`https://stream-platform-api.kiwismurph.workers.dev/api/events/${eventId}/whip/provision?key=${key}`, {method:"POST"});
  const data = await res.json();

  document.getElementById("obs").style.display = "block";
  document.getElementById("server").textContent = data.whip_url || "https://global.whip.live-video.net";
  document.getElementById("token").textContent = data.bearer_token;
}

function copyAll(){
  const text = "Server: https://global.whip.live-video.net\nToken: " + document.getElementById("token").textContent;
  navigator.clipboard.writeText(text);
}
</script>

</body>
</html>
