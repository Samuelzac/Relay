<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Relay Broadcast</title>

  <!-- Amazon IVS Real-Time Web Broadcast SDK (Stages / WebRTC) -->
  <script src="https://web-broadcast.live-video.net/1.17.0/amazon-ivs-web-broadcast.js"></script>

  <style>
    :root { color-scheme: dark; }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; background: #0b0c10; color: #e8e8e8; margin: 0; }
    header { padding: 14px 16px; border-bottom: 1px solid #20232a; display:flex; gap:12px; align-items:center; justify-content:space-between; }
    .title { font-weight:700; }
    .pill { font-size:12px; padding:4px 8px; border:1px solid #2b2f3a; border-radius:999px; color:#cbd5e1; }
    .pill.good { border-color:#1f6f4a; color:#bff7de; }
    .pill.warn { border-color:#7a5a0a; color:#ffe3a3; }
    .pill.bad { border-color:#7c2d38; color:#ffb4b4; }
    main { padding: 14px 16px; max-width: 1100px; margin: 0 auto; }
    .row { display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin-bottom:10px; }
    button { background:#1f2937; border:1px solid #334155; color:#e5e7eb; padding:10px 12px; border-radius:10px; cursor:pointer; }
    button:disabled { opacity:0.5; cursor:not-allowed; }
    select, input { background:#0f172a; border:1px solid #334155; color:#e5e7eb; padding:9px 10px; border-radius:10px; }
    .card { border:1px solid #20232a; border-radius:14px; padding:12px; background:#0f1117; }
    video { width:100%; background:#000; border-radius:12px; border:1px solid #20232a; }
    .grid { display:grid; gap:12px; grid-template-columns: 1fr; }
    @media (min-width: 900px){ .grid { grid-template-columns: 2fr 1fr; } }
    .log { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size:12px; white-space:pre-wrap; background:#0b1220; border:1px solid #202a3a; border-radius:12px; padding:10px; max-height: 240px; overflow:auto; }
    .muted { color:#a3a3a3; }
    .timer { font-variant-numeric: tabular-nums; font-weight:700; }
  </style>
</head>
<body>
  <header>
    <div class="title">Relay Broadcast</div>
    <div class="row">
      <span id="statusPill" class="pill">status: —</span>
      <span id="readyPill" class="pill warn">ready: checking…</span>
      <span id="timerPill" class="pill"><span class="muted">live:</span> <span class="timer" id="timer">00:00</span></span>
    </div>
  </header>

  <main>
    <div class="grid">
      <div class="card">
        <div class="row">
          <label class="muted">Event</label>
          <input id="eventId" style="min-width:320px" />
          <label class="muted">Key</label>
          <input id="eventKey" style="min-width:320px" />
        </div>

        <div class="row">
          <label class="muted">Camera</label>
          <select id="camera"></select>
          <label class="muted">Mic</label>
          <select id="mic"></select>

          <button id="btnPreview">Preview</button>
          <button id="btnGoLive" disabled>Go Live</button>
          <button id="btnStop">Stop</button>
        </div>

        <div id="readyInfo" class="muted" style="margin:0 0 8px;"></div>
        <video id="preview" playsinline autoplay muted></video>
        <div class="muted" id="info" style="margin-top:6px;"></div>
      </div>

      <div class="card">
        <div class="row" style="justify-content:space-between;">
          <div class="muted">Logs</div>
          <button id="btnClear" style="padding:8px 10px;">Clear</button>
        </div>
        <div id="log" class="log"></div>
      </div>
    </div>
  </main>

<script>
(() => {
  const API_BASE = (location.origin.includes("pages.dev") || location.origin.includes("localhost"))
    ? "https://stream-platform-api.kiwismurph.workers.dev"
    : location.origin;

  const qs = new URLSearchParams(location.search);
  const $ = (id) => document.getElementById(id);

  const elEventId = $("eventId");
  const elEventKey = $("eventKey");
  const elStatus = $("statusPill");
  const elReady = $("readyPill");
  const elReadyInfo = $("readyInfo");
  const elTimer = $("timer");
  const elLog = $("log");
  const elInfo = $("info");

  const elCam = $("camera");
  const elMic = $("mic");

  const btnPreview = $("btnPreview");
  const btnGoLive = $("btnGoLive");
  const btnStop = $("btnStop");
  const btnClear = $("btnClear");

  const videoEl = $("preview");

  let localStream = null;
  let stage = null;
  let stageToken = null;
  let startedAtMs = null;
  let timerHandle = null;
  let readinessTimer = null;
  let readyToBroadcast = false;
  let lastHlsWarmAt = 0;
  let lastWarmStart = null;

  elEventId.value = qs.get("event") || qs.get("id") || "";
  elEventKey.value = qs.get("key") || "";

  function log(...args){
    const line = args.map(a => typeof a === "string" ? a : JSON.stringify(a)).join(" ");
    elLog.textContent += line + "\n";
    elLog.scrollTop = elLog.scrollHeight;
    console.log(...args);
  }
  btnClear.onclick = () => { elLog.textContent = ""; };

  function setStatus(t){ elStatus.textContent = "status: " + t; }
  function setReady(ready, text, detail, kind){
    readyToBroadcast = ready;
    btnGoLive.disabled = !ready;
    elReady.className = "pill " + (kind || (ready ? "good" : "warn"));
    elReady.textContent = "ready: " + text;
    elReadyInfo.textContent = detail || "";
  }

  function apiUrl(path){ return API_BASE + path; }

  async function apiGet(path){
    const r = await fetch(apiUrl(path), { method:"GET", credentials:"include", cache:"no-store" });
    const t = await r.text();
    let j=null; try{ j = t ? JSON.parse(t) : null; }catch{}
    if(!r.ok) throw new Error(`GET ${path} -> ${r.status} ${t}`);
    return j;
  }
  async function apiPost(path, body){
    const r = await fetch(apiUrl(path), {
      method:"POST",
      headers:{ "content-type":"application/json" },
      body: body ? JSON.stringify(body) : "{}",
      credentials:"include"
    });
    const t = await r.text();
    let j=null; try{ j = t ? JSON.parse(t) : null; }catch{}
    if(!r.ok) throw new Error(`POST ${path} -> ${r.status} ${t}`);
    return j;
  }

  function stopTimer(){
    if(timerHandle) clearInterval(timerHandle);
    timerHandle = null;
    startedAtMs = null;
    elTimer.textContent = "00:00";
  }

  function startTimer(){
    if(timerHandle) clearInterval(timerHandle);
    timerHandle = setInterval(() => {
      if(!startedAtMs) return;
      const s = Math.floor((Date.now() - startedAtMs)/1000);
      const mm = String(Math.floor(s/60)).padStart(2,"0");
      const ss = String(s%60).padStart(2,"0");
      elTimer.textContent = `${mm}:${ss}`;
    }, 250);
  }

  async function listDevices(){
    const devices = await navigator.mediaDevices.enumerateDevices();
    const cams = devices.filter(d => d.kind === "videoinput");
    const mics = devices.filter(d => d.kind === "audioinput");

    elCam.innerHTML = cams.map((d,i)=>`<option value="${d.deviceId}">${d.label || "Camera " + (i+1)}</option>`).join("");
    elMic.innerHTML = mics.map((d,i)=>`<option value="${d.deviceId}">${d.label || "Mic " + (i+1)}</option>`).join("");
  }

  async function getLocalMedia(){
    const camId = elCam.value || undefined;
    const micId = elMic.value || undefined;

    const constraints = {
      video: camId ? { deviceId: { exact: camId }, width:{ ideal:1280 }, height:{ ideal:720 }, frameRate:{ ideal:30 } }
                   : { width:{ ideal:1280 }, height:{ ideal:720 }, frameRate:{ ideal:30 } },
      audio: micId ? { deviceId: { exact: micId } } : true
    };

    const stream = await navigator.mediaDevices.getUserMedia(constraints);
    return stream;
  }

  async function preview(){
    setStatus("previewing…");
    if(localStream){
      localStream.getTracks().forEach(t=>t.stop());
      localStream = null;
    }
    localStream = await getLocalMedia();
    videoEl.srcObject = localStream;
    elInfo.textContent = "Preview ready.";
    setStatus("ready");
  }

  async function loadPublicOptional(){
    const eventId = elEventId.value.trim();
    const key = elEventKey.value.trim();
    if(!eventId || !key) throw new Error("Missing event or key");
    try{
      const pub = await apiGet(`/api/events/${encodeURIComponent(eventId)}/public?key=${encodeURIComponent(key)}`);
      log("PUBLIC", pub);
      return pub;
    }catch(e){
      log("PUBLIC optional failed", String(e));
      return null;
    }
  }

  async function provisionPublishToken(){
    const eventId = elEventId.value.trim();
    const key = elEventKey.value.trim();
    if(!eventId || !key) throw new Error("Missing event or key");

    const prov = await apiPost(`/api/events/${encodeURIComponent(eventId)}/rtc/provision?key=${encodeURIComponent(key)}`, {});
    stageToken = prov?.participantToken || prov?.publisher?.token;
    if(!stageToken) throw new Error("No publisher token returned from /rtc/provision");
    return prov;
  }

  async function warmStartNonFatal(force = false){
    const eventId = elEventId.value.trim();
    const key = elEventKey.value.trim();
    if(!eventId || !key) return null;

    const now = Date.now();
    if(!force && now - lastHlsWarmAt < 3000) return lastWarmStart;
    lastHlsWarmAt = now;

    try{
      const res = await apiPost(`/api/events/${encodeURIComponent(eventId)}/start?key=${encodeURIComponent(key)}`, {});
      lastWarmStart = res;
      log("WARM START", res);
      return res;
    }catch(e){
      log("WARM START failed (non-fatal)", String(e));
      return null;
    }
  }

  function stopReadiness(){
    if(readinessTimer){
      clearTimeout(readinessTimer);
      readinessTimer = null;
    }
  }

  function scheduleReadiness(ms = 2500){
    stopReadiness();
    readinessTimer = setTimeout(() => {
      readinessTimer = null;
      refreshReadiness().catch(e => {
        log("READINESS polling error", String(e));
        scheduleReadiness(2500);
      });
    }, ms);
  }

  async function refreshReadiness(){
    try{
      setStatus("checking…");

      const pub = await loadPublicOptional();
      if(pub?.expired){
        setReady(false, "no", "Event expired.", "bad");
        return;
      }
      if(pub && pub.status && pub.status !== "paid"){
        setReady(false, "no", "Waiting for payment confirmation…", "warn");
        scheduleReadiness(2500);
        return;
      }

      const startRes = await warmStartNonFatal();
      const hlsEnabled = !!(pub?.hls_enabled || startRes?.playback_url || startRes?.composition_started || startRes?.composition_arn);

      try{
        await provisionPublishToken();
        setReady(
          true,
          "yes",
          hlsEnabled
            ? "Ready to go live. HLS is warming in the background."
            : "Ready to go live.",
          "good"
        );
        setStatus("ready");
      }catch(e){
        setReady(false, "no", "Preparing broadcaster access…", "warn");
        log("READINESS provision failed", String(e));
        scheduleReadiness(2500);
      }
    }catch(e){
      setStatus("error");
      setReady(false, "no", String(e), "bad");
      scheduleReadiness(2500);
    }
  }

  async function goLive(){
    const sdk = window.IVSBroadcastClient;
    if(!sdk) throw new Error("IVS Web Broadcast SDK not loaded.");

    const { Stage, StageEvents, SubscribeType, LocalStageStream, StageConnectionState } = sdk;

    if(!readyToBroadcast){
      await refreshReadiness();
      if(!readyToBroadcast) throw new Error("Broadcast path is still preparing.");
    }

    if(!localStream) await preview();
    await provisionPublishToken();

    const tracks = localStream.getTracks();
    const audioTrack = tracks.find(t => t.kind === "audio");
    const videoTrack = tracks.find(t => t.kind === "video");

    if(!videoTrack) throw new Error("No video track available.");

    const strategy = {
      audioTrack: audioTrack ? new LocalStageStream(audioTrack) : null,
      videoTrack: new LocalStageStream(videoTrack),

      stageStreamsToPublish() {
        const out = [];
        if(this.audioTrack) out.push(this.audioTrack);
        if(this.videoTrack) out.push(this.videoTrack);
        return out;
      },
      shouldPublishParticipant() { return true; },
      shouldSubscribeToParticipant() { return SubscribeType.NONE; }
    };

    stage = new Stage(stageToken, strategy);

    stage.on(StageEvents.STAGE_CONNECTION_STATE_CHANGED, async (state) => {
      log("RTC state", state);
      if(state === StageConnectionState.CONNECTED){
        setStatus("live");
        try{
          const eventId = elEventId.value.trim();
          const key = elEventKey.value.trim();
          const res = await apiPost(`/api/events/${encodeURIComponent(eventId)}/start?key=${encodeURIComponent(key)}`, {});
          lastWarmStart = res;
          log("START", res);
        }catch(e){
          log("START failed (non-fatal)", String(e));
        }
        if(!startedAtMs){ startedAtMs = Date.now(); startTimer(); }
      }
      if(state === StageConnectionState.CONNECTING) setStatus("connecting…");
      if(state === StageConnectionState.ERRORED) setStatus("reconnecting…");
      if(state === StageConnectionState.DISCONNECTED) {
        setStatus("disconnected");
        setReady(false, "no", "Connection lost. Rechecking broadcast readiness…", "warn");
        scheduleReadiness(2500);
      }
    });

    setStatus("joining…");
    await stage.join();
    elInfo.textContent = "Publishing to stage.";
  }

  async function stopAll(){
    try{ stage && stage.leave(); }catch{}
    stage = null;

    if(localStream){
      localStream.getTracks().forEach(t=>t.stop());
      localStream = null;
    }
    videoEl.srcObject = null;

    stopTimer();
    setStatus("stopped");
    elInfo.textContent = "";
    setReady(false, "checking…", "Rechecking event…", "warn");
    scheduleReadiness(1500);
  }

  btnPreview.onclick = async () => {
    try{ btnPreview.disabled=true; await preview(); }
    catch(e){ log("Preview error", String(e)); setStatus("error"); }
    finally{ btnPreview.disabled=false; }
  };

  btnGoLive.onclick = async () => {
    try{ btnGoLive.disabled=true; await goLive(); }
    catch(e){ log("GoLive error", String(e)); setStatus("error"); }
    finally{ btnGoLive.disabled=!readyToBroadcast; }
  };

  btnStop.onclick = async () => {
    try{ await stopAll(); }
    catch(e){ log("Stop error", String(e)); }
  };

  function scheduleReload(){
    stopReadiness();
    lastWarmStart = null;
    setReady(false, "checking…", "Rechecking event…", "warn");
    setTimeout(() => {
      refreshReadiness().catch(e => {
        log("Input change readiness error", String(e));
        scheduleReadiness(2500);
      });
    }, 300);
  }
  elEventId.addEventListener("input", scheduleReload);
  elEventKey.addEventListener("input", scheduleReload);

  (async () => {
    try{
      setStatus("init…");
      const s = await navigator.mediaDevices.getUserMedia({ video:true, audio:true });
      s.getTracks().forEach(t=>t.stop());
      await listDevices();
      await refreshReadiness();
    }catch(e){
      log("Init error", String(e));
      setStatus("needs permissions");
      setReady(false, "no", "Allow camera/microphone permissions, then reload.", "bad");
    }
  })();
})();
</script>
</body>
</html>
