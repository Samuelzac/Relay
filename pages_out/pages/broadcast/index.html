<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Relay Broadcast</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
body{font-family:sans-serif;background:#111;color:#fff;margin:0;padding:20px}
button{padding:14px 22px;font-size:18px;border-radius:8px;border:none}
#go{background:#2ecc71;color:#000}
#stop{background:#e74c3c;color:#fff}
#status{margin-top:15px;font-size:16px}
video{width:100%;max-width:900px;border-radius:10px;background:#000}
</style>
</head>

<body>

<h2>Broadcast</h2>

<video id="preview" autoplay muted playsinline></video>

<br><br>

<button id="go" disabled>Preparing stream…</button>
<button id="stop" style="display:none">End Stream</button>

<div id="status">Initializing…</div>

<script>

const API="https://stream-platform-api.kiwismurph.workers.dev"

const qs=new URLSearchParams(location.search)
const EVENT=qs.get("event")
const KEY=qs.get("key")

const statusEl=document.getElementById("status")
const goBtn=document.getElementById("go")
const stopBtn=document.getElementById("stop")
const preview=document.getElementById("preview")

let localStream
let stage
let joined=false

function log(msg){
  console.log(msg)
  statusEl.innerText=msg
}

async function apiPost(url,data={}){
  const r=await fetch(url,{
    method:"POST",
    headers:{'content-type':'application/json'},
    body:JSON.stringify(data)
  })
  if(!r.ok) throw new Error(await r.text())
  return r.json()
}

async function waitUntilReady(){

  log("Preparing stream…")

  while(true){

    try{

      const prov=await apiPost(
        `${API}/api/events/${EVENT}/rtc/provision?key=${KEY}`,{}
      )

      if(prov){
        log("Ready to go live")
        goBtn.disabled=false
        goBtn.innerText="Go Live"
        return
      }

    }catch(e){
      log("Preparing stream… please wait")
    }

    await new Promise(r=>setTimeout(r,2000))
  }
}

async function setupCamera(){

  localStream=await navigator.mediaDevices.getUserMedia({
    video:true,
    audio:true
  })

  preview.srcObject=localStream
}

async function goLive(){

  goBtn.disabled=true
  log("Starting broadcast…")

  try{

    const prov=await apiPost(
      `${API}/api/events/${EVENT}/rtc/provision?key=${KEY}`,{}
    )

    const token=
      prov.participantToken ||
      prov.publisher?.token ||
      prov.token

    stage=new IVSBroadcastClient.Stage(token)

    stage.on("connectionStateChanged",(s)=>{
      log("Connection: "+s)
    })

    await stage.join()

    localStream.getTracks().forEach(track=>{
      stage.publishTrack(track)
    })

    joined=true

    goBtn.style.display="none"
    stopBtn.style.display="inline-block"

    log("LIVE")

  }catch(e){
    log("Failed to start: "+e.message)
    goBtn.disabled=false
  }

}

async function stopLive(){

  if(stage){
    stage.leave()
  }

  joined=false

  stopBtn.style.display="none"
  goBtn.style.display="inline-block"
  goBtn.disabled=false

  log("Stream ended")
}

goBtn.onclick=goLive
stopBtn.onclick=stopLive

async function init(){
  await setupCamera()
  await waitUntilReady()
}

init()

</script>

<script src="https://web-broadcast.live-video.net/1.15.0/amazon-ivs-web-broadcast.js"></script>

</body>
</html>
