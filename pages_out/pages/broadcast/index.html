<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Relay Broadcast</title>

  <script src="https://web-broadcast.live-video.net/1.17.0/amazon-ivs-web-broadcast.js"></script>

  <style>
    :root{
      color-scheme: dark;
      --bg:#000;
      --panel:rgba(18,18,18,.74);
      --panel-2:rgba(255,255,255,.08);
      --border:rgba(255,255,255,.14);
      --text:#fff;
      --muted:rgba(255,255,255,.74);
      --good:#34d399;
      --warn:#fbbf24;
      --bad:#ff8a80;
      --btn:#1976d2;
      --btnStop:#b42318;
      --shadow:0 10px 30px rgba(0,0,0,.35);
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
    body{min-height:100svh; overflow:hidden}

    .shell{position:relative;min-height:100svh;display:grid;grid-template-rows:auto 1fr auto;background:#000}
    .preview-wrap{position:absolute;inset:0;background:#000}
    video{width:100%;height:100%;object-fit:cover;display:block;background:#000}
    .scrim-top{position:absolute;inset:0 0 auto 0;height:160px;background:linear-gradient(to bottom, rgba(0,0,0,.72), rgba(0,0,0,0));pointer-events:none;z-index:1}
    .scrim-bottom{position:absolute;inset:auto 0 0 0;height:220px;background:linear-gradient(to top, rgba(0,0,0,.78), rgba(0,0,0,0));pointer-events:none;z-index:1}
    .topbar{position:relative;z-index:2;padding:calc(12px + env(safe-area-inset-top)) 14px 10px 14px;display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
    .title-block{display:flex;flex-direction:column;gap:6px;min-width:0}
    .title{font-size:20px;font-weight:800;letter-spacing:.2px}
    .subtitle{color:var(--muted);font-size:13px;max-width:min(70vw,560px)}
    .status-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    .pill{display:inline-flex;align-items:center;gap:8px;min-height:32px;padding:6px 10px;border-radius:999px;background:rgba(0,0,0,.42);border:1px solid var(--border);backdrop-filter: blur(10px);font-size:12px;white-space:nowrap}
    .dot{width:8px;height:8px;border-radius:999px;background:#8a8a8a}
    .pill.good .dot{background:var(--good)}
    .pill.warn .dot{background:var(--warn)}
    .pill.bad .dot{background:var(--bad)}
    .bottom-ui{position:relative;z-index:2;margin-top:auto;padding:12px 14px calc(16px + env(safe-area-inset-bottom)) 14px;display:grid;gap:12px}
    .panel{background:var(--panel);border:1px solid var(--border);border-radius:18px;backdrop-filter: blur(16px);box-shadow:var(--shadow)}
    .controls{padding:14px;display:grid;gap:12px}
    .inputs{display:grid;gap:10px;grid-template-columns:1fr}
    .input-row{display:grid;gap:10px;grid-template-columns:1fr 1fr}
    .field{display:grid;gap:6px}
    .label{font-size:12px;color:var(--muted)}
    input,select,button{font:inherit}
    input,select{width:100%;min-height:46px;border-radius:12px;border:1px solid var(--border);background:rgba(255,255,255,.08);color:var(--text);padding:10px 12px;outline:none}
    input::placeholder{color:rgba(255,255,255,.48)}
    .actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
    button{min-height:52px;border-radius:14px;border:0;cursor:pointer;font-weight:800;color:#fff;background:var(--panel-2)}
    button.primary{background:var(--btn)}
    button.stop{background:var(--btnStop)}
    button:disabled{opacity:.48;cursor:not-allowed}
    .meta{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;color:var(--muted);font-size:13px}
    .state-line{display:flex;gap:8px;flex-wrap:wrap}
    .chip{padding:6px 10px;border-radius:999px;border:1px solid var(--border);font-size:12px;background:rgba(255,255,255,.06)}
    details{overflow:hidden}
    summary{list-style:none;cursor:pointer;padding:12px 14px;color:var(--muted);font-size:13px;border-bottom:1px solid transparent}
    details[open] summary{border-bottom-color:var(--border)}
    summary::-webkit-details-marker{display:none}
    .log{padding:12px 14px 14px 14px;max-height:220px;overflow:auto;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12px;white-space:pre-wrap;line-height:1.4;color:#d7d7d7;background:rgba(0,0,0,.2)}
    .empty-preview{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;text-align:center;padding:20px;color:rgba(255,255,255,.68);font-size:14px;pointer-events:none;z-index:0}
    @media (max-width:760px){.topbar{flex-direction:column;align-items:stretch}.status-row{justify-content:flex-start}.input-row{grid-template-columns:1fr}.actions{grid-template-columns:1fr}.title{font-size:18px}}
  </style>
</head>
<body>
  <div class="shell">
    <div class="preview-wrap">
      <video id="preview" playsinline autoplay muted></video>
      <div class="empty-preview" id="emptyPreview">Camera preview will appear here</div>
      <div class="scrim-top"></div>
      <div class="scrim-bottom"></div>
    </div>

    <div class="topbar">
      <div class="title-block">
        <div class="title">Relay Broadcast</div>
        <div class="subtitle" id="readyInfo">Checking broadcaster access…</div>
      </div>

      <div class="status-row">
        <span id="statusPill" class="pill"><span class="dot"></span><span>status: —</span></span>
        <span id="readyPill" class="pill warn"><span class="dot"></span><span>ready: checking…</span></span>
        <span id="timerPill" class="pill"><span class="dot"></span><span>live: <span id="timer">00:00</span></span></span>
      </div>
    </div>

    <div></div>

    <div class="bottom-ui">
      <div class="panel controls">
        <div class="inputs">
          <div class="input-row">
            <div class="field">
              <label class="label" for="eventId">Event</label>
              <input id="eventId" />
            </div>
            <div class="field">
              <label class="label" for="eventKey">Key</label>
              <input id="eventKey" />
            </div>
          </div>

          <div class="input-row">
            <div class="field">
              <label class="label" for="camera">Camera</label>
              <select id="camera"></select>
            </div>
            <div class="field">
              <label class="label" for="mic">Mic</label>
              <select id="mic"></select>
            </div>
          </div>
        </div>

        <div class="actions">
          <button id="btnPreview">Preview</button>
          <button id="btnGoLive" class="primary" disabled>Go Live</button>
          <button id="btnStop" class="stop">Stop</button>
        </div>

        <div class="meta">
          <div id="info">Waiting for preview…</div>
          <div id="liveHint">Preparing stream path…</div>
        </div>

        <div class="state-line" id="stateLine"></div>
      </div>

      <details class="panel">
        <summary>Logs</summary>
        <div id="log" class="log"></div>
      </details>
    </div>
  </div>

<script>
(() => {
  const API_BASE = (location.origin.includes("pages.dev") || location.origin.includes("localhost"))
    ? "https://stream-platform-api.kiwismurph.workers.dev"
    : location.origin;

  const qs = new URLSearchParams(location.search);
  const $ = (id) => document.getElementById(id);

  const elEventId = $("eventId");
  const elEventKey = $("eventKey");
  const elStatus = $("statusPill");
  const elReady = $("readyPill");
  const elReadyInfo = $("readyInfo");
  const elTimer = $("timer");
  const elLog = $("log");
  const elInfo = $("info");
  const elLiveHint = $("liveHint");
  const elCam = $("camera");
  const elMic = $("mic");
  const elStateLine = $("stateLine");
  const btnPreview = $("btnPreview");
  const btnGoLive = $("btnGoLive");
  const btnStop = $("btnStop");
  const videoEl = $("preview");
  const emptyPreview = $("emptyPreview");

  let localStream = null;
  let stage = null;
  let stageToken = null;
  let startedAtMs = null;
  let timerHandle = null;
  let readinessTimer = null;
  let readyToBroadcast = false;
  let currentPublic = null;
  let currentReadiness = null;
  let currentReadinessState = "checking";

  elEventId.value = qs.get("event") || qs.get("id") || "";
  elEventKey.value = qs.get("key") || "";

  function log(...args){
    const line = args.map(a => typeof a === "string" ? a : JSON.stringify(a)).join(" ");
    elLog.textContent += line + "\n";
    elLog.scrollTop = elLog.scrollHeight;
    console.log(...args);
  }

  function setStatus(t, kind){
    elStatus.className = `pill ${kind || ""}`.trim();
    elStatus.querySelector("span:last-child").textContent = "status: " + t;
  }

  function setReady(ready, text, detail, kind){
    readyToBroadcast = ready;
    btnGoLive.disabled = !ready;
    elReady.className = `pill ${kind || (ready ? "good" : "warn")}`.trim();
    elReady.querySelector("span:last-child").textContent = "ready: " + text;
    elReadyInfo.textContent = detail || "";
  }

  function renderFlags(readiness){
    const flags = [];
    if (!readiness) {
      elStateLine.innerHTML = "";
      return;
    }
    flags.push(["Stage", readiness.stage_exists]);
    if (readiness.hls_enabled) flags.push(["HLS channel", readiness.hls_channel_exists]);
    if (readiness.hls_enabled) flags.push(["Encoder", readiness.encoder_configuration_exists]);
    if (readiness.hls_enabled) flags.push(["Composition", readiness.composition_started]);
    if (readiness.hls_enabled) flags.push(["Playback URL", readiness.playback_url_exists]);
    if (readiness.whip_url_exists) flags.push(["WHIP", readiness.whip_url_exists]);

    elStateLine.innerHTML = flags.map(([label, ok]) => `<span class="chip">${label}: ${ok ? "yes" : "no"}</span>`).join("");
  }

  function apiUrl(path){ return API_BASE + path; }

  async function apiGet(path){
    const r = await fetch(apiUrl(path), { method:"GET", credentials:"include", cache:"no-store" });
    const t = await r.text();
    let j = null; try { j = t ? JSON.parse(t) : null; } catch {}
    if(!r.ok) throw new Error(`GET ${path} -> ${r.status} ${t}`);
    return j;
  }

  async function apiPost(path, body){
    const r = await fetch(apiUrl(path), {
      method:"POST",
      headers:{ "content-type":"application/json" },
      body: body ? JSON.stringify(body) : "{}",
      credentials:"include"
    });
    const t = await r.text();
    let j = null; try { j = t ? JSON.parse(t) : null; } catch {}
    if(!r.ok) throw new Error(`POST ${path} -> ${r.status} ${t}`);
    return j;
  }

  function stopTimer(){
    if(timerHandle) clearInterval(timerHandle);
    timerHandle = null;
    startedAtMs = null;
    elTimer.textContent = "00:00";
  }

  function startTimer(){
    if(timerHandle) clearInterval(timerHandle);
    timerHandle = setInterval(() => {
      if(!startedAtMs) return;
      const s = Math.floor((Date.now() - startedAtMs)/1000);
      const mm = String(Math.floor(s/60)).padStart(2,"0");
      const ss = String(s%60).padStart(2,"0");
      elTimer.textContent = `${mm}:${ss}`;
    }, 250);
  }

  async function listDevices(){
    const devices = await navigator.mediaDevices.enumerateDevices();
    const cams = devices.filter(d => d.kind === "videoinput");
    const mics = devices.filter(d => d.kind === "audioinput");

    elCam.innerHTML = cams.map((d,i)=>`<option value="${d.deviceId}">${d.label || "Camera " + (i+1)}</option>`).join("");
    elMic.innerHTML = mics.map((d,i)=>`<option value="${d.deviceId}">${d.label || "Mic " + (i+1)}</option>`).join("");
  }

  async function getLocalMedia(){
    const camId = elCam.value || undefined;
    const micId = elMic.value || undefined;

    const constraints = {
      video: camId ? { deviceId: { exact: camId }, width:{ ideal:1280 }, height:{ ideal:720 }, frameRate:{ ideal:30 } }
                   : { width:{ ideal:1280 }, height:{ ideal:720 }, frameRate:{ ideal:30 } },
      audio: micId ? { deviceId: { exact: micId } } : true
    };

    return navigator.mediaDevices.getUserMedia(constraints);
  }

  async function preview(){
    setStatus("previewing…", "warn");
    if(localStream){
      localStream.getTracks().forEach(t => t.stop());
      localStream = null;
    }
    localStream = await getLocalMedia();
    videoEl.srcObject = localStream;
    emptyPreview.style.display = "none";
    elInfo.textContent = "Preview ready.";
    setStatus("preview ready", "good");
  }

  async function loadPublicOptional(){
    const eventId = elEventId.value.trim();
    const key = elEventKey.value.trim();
    if(!eventId || !key) throw new Error("Missing event or key");
    try{
      const pub = await apiGet(`/api/events/${encodeURIComponent(eventId)}/public?key=${encodeURIComponent(key)}`);
      currentPublic = pub;
      return pub;
    }catch(e){
      log("PUBLIC optional failed", String(e));
      return null;
    }
  }

  async function fetchReadiness(){
    const eventId = elEventId.value.trim();
    const key = elEventKey.value.trim();
    if(!eventId || !key) throw new Error("Missing event or key");
    const res = await apiGet(`/api/events/${encodeURIComponent(eventId)}/readiness?key=${encodeURIComponent(key)}`);
    currentReadiness = res?.readiness || null;
    currentReadinessState = currentReadiness?.state || "checking";
    renderFlags(currentReadiness);
    return res;
  }

  async function provisionPublishToken(){
    const eventId = elEventId.value.trim();
    const key = elEventKey.value.trim();
    if(!eventId || !key) throw new Error("Missing event or key");

    const prov = await apiPost(`/api/events/${encodeURIComponent(eventId)}/rtc/provision?key=${encodeURIComponent(key)}`, {});
    stageToken = prov?.participantToken || prov?.publisher?.token;
    if(!stageToken) throw new Error("No publisher token returned from /rtc/provision");
    return prov;
  }

  function stopReadiness(){
    if(readinessTimer){
      clearTimeout(readinessTimer);
      readinessTimer = null;
    }
  }

  function scheduleReadiness(ms = 2500){
    stopReadiness();
    readinessTimer = setTimeout(() => {
      readinessTimer = null;
      refreshReadiness().catch(e => {
        log("READINESS polling error", String(e));
        scheduleReadiness(2500);
      });
    }, ms);
  }

  function applyReadinessUi(readiness){
    if(!readiness){
      setStatus("checking…", "warn");
      setReady(false, "no", "Checking stream readiness…", "warn");
      return;
    }

    const state = readiness.state || "checking";

    if(readiness.expired){
      setStatus("expired", "bad");
      setReady(false, "no", readiness.detail || "Event expired.", "bad");
      elLiveHint.textContent = "This event has expired.";
      return;
    }

    if(!readiness.paid){
      setStatus("awaiting payment", "warn");
      setReady(false, "no", readiness.detail || "Waiting for payment confirmation…", "warn");
      elLiveHint.textContent = "Infrastructure will pre-provision once payment is confirmed.";
      return;
    }

    if(state === "preparing_stage" || state === "preparing_hls_channel" || state === "preparing_encoder"){
      setStatus("preparing stream", "warn");
      setReady(false, "no", readiness.detail || "Preparing stream…", "warn");
      elLiveHint.textContent = readiness.hls_enabled ? "HLS infrastructure is being prepared in advance." : "RTC infrastructure is being prepared in advance.";
      return;
    }

    if(readiness.can_go_live){
      setStatus(readiness.stream_window_open ? "live window open" : "ready to go live", "good");
      setReady(true, "yes", readiness.detail || "Ready to go live.", "good");
      elLiveHint.textContent = readiness.hls_enabled
        ? (readiness.composition_started ? "HLS composition is running." : "HLS will start as soon as you go live.")
        : "RTC is ready.";
      return;
    }

    setStatus("checking…", "warn");
    setReady(false, "no", readiness.detail || "Checking stream readiness…", "warn");
  }

  async function refreshReadiness(){
    try{
      const pub = await loadPublicOptional();
      if(pub?.expired){
        setStatus("expired", "bad");
        setReady(false, "no", "Event expired.", "bad");
        return;
      }

      const readyRes = await fetchReadiness();
      applyReadinessUi(readyRes?.readiness || null);

      if(currentReadiness && !currentReadiness.can_go_live && !currentReadiness.expired){
        scheduleReadiness(2500);
      }
    }catch(e){
      setStatus("error", "bad");
      setReady(false, "no", String(e), "bad");
      scheduleReadiness(2500);
    }
  }

  async function startForBroadcast(){
    const eventId = elEventId.value.trim();
    const key = elEventKey.value.trim();
    const res = await apiPost(`/api/events/${encodeURIComponent(eventId)}/start?key=${encodeURIComponent(key)}`, { open_window: true });
    currentReadiness = res?.readiness || currentReadiness;
    renderFlags(currentReadiness);
    return res;
  }

  async function goLive(){
    const sdk = window.IVSBroadcastClient;
    if(!sdk) throw new Error("IVS Web Broadcast SDK not loaded.");

    const { Stage, StageEvents, SubscribeType, LocalStageStream, StageConnectionState } = sdk;

    await refreshReadiness();
    if(!readyToBroadcast) throw new Error("Broadcast path is still preparing.");

    if(!localStream) await preview();
    await provisionPublishToken();

    const tracks = localStream.getTracks();
    const audioTrack = tracks.find(t => t.kind === "audio");
    const videoTrack = tracks.find(t => t.kind === "video");
    if(!videoTrack) throw new Error("No video track available.");

    const strategy = {
      audioTrack: audioTrack ? new LocalStageStream(audioTrack) : null,
      videoTrack: new LocalStageStream(videoTrack),
      stageStreamsToPublish() {
        const out = [];
        if(this.audioTrack) out.push(this.audioTrack);
        if(this.videoTrack) out.push(this.videoTrack);
        return out;
      },
      shouldPublishParticipant() { return true; },
      shouldSubscribeToParticipant() { return SubscribeType.NONE; }
    };

    stage = new Stage(stageToken, strategy);

    stage.on(StageEvents.STAGE_CONNECTION_STATE_CHANGED, async (state) => {
      log("RTC state", state);

      if(state === StageConnectionState.CONNECTED){
        setStatus("connecting live…", "warn");
        setReady(true, "connecting", "Publisher connected. Opening live stream…", "warn");
        try{
          const res = await startForBroadcast();
          log("START", res);
        }catch(e){
          log("START failed (non-fatal)", String(e));
        }
        setStatus("live", "good");
        setReady(true, "live", "You are live.", "good");
        if(!startedAtMs){
          startedAtMs = Date.now();
          startTimer();
        }
      }

      if(state === StageConnectionState.CONNECTING) setStatus("connecting…", "warn");
      if(state === StageConnectionState.ERRORED) setStatus("reconnecting…", "warn");
      if(state === StageConnectionState.DISCONNECTED){
        setStatus("disconnected", "bad");
        setReady(false, "no", "Connection lost. Rechecking broadcast readiness…", "warn");
        scheduleReadiness(2500);
      }
    });

    setStatus("joining…", "warn");
    await stage.join();
    elInfo.textContent = "Publishing to stage.";
  }

  async function stopAll(){
    try{ stage && stage.leave(); }catch{}
    stage = null;

    if(localStream){
      localStream.getTracks().forEach(t => t.stop());
      localStream = null;
    }
    videoEl.srcObject = null;
    emptyPreview.style.display = "";

    stopTimer();
    setStatus("stopped", "warn");
    elInfo.textContent = "Stopped.";
    setReady(false, "checking…", "Rechecking event…", "warn");
    scheduleReadiness(1500);
  }

  btnPreview.onclick = async () => {
    try{
      btnPreview.disabled = true;
      await preview();
    } catch(e){
      log("Preview error", String(e));
      setStatus("error", "bad");
    } finally {
      btnPreview.disabled = false;
    }
  };

  btnGoLive.onclick = async () => {
    try{
      btnGoLive.disabled = true;
      await goLive();
    } catch(e){
      log("GoLive error", String(e));
      setStatus("error", "bad");
    } finally {
      btnGoLive.disabled = !readyToBroadcast;
    }
  };

  btnStop.onclick = async () => {
    try{ await stopAll(); }
    catch(e){ log("Stop error", String(e)); }
  };

  function scheduleReload(){
    stopReadiness();
    currentPublic = null;
    currentReadiness = null;
    setReady(false, "checking…", "Rechecking event…", "warn");
    setStatus("checking…", "warn");
    setTimeout(() => {
      refreshReadiness().catch(e => {
        log("Input change readiness error", String(e));
        scheduleReadiness(2500);
      });
    }, 300);
  }

  elEventId.addEventListener("input", scheduleReload);
  elEventKey.addEventListener("input", scheduleReload);

  (async () => {
    try{
      setStatus("init…", "warn");
      const s = await navigator.mediaDevices.getUserMedia({ video:true, audio:true });
      s.getTracks().forEach(t => t.stop());
      await listDevices();
      await refreshReadiness();
    } catch(e){
      log("Init error", String(e));
      setStatus("needs permissions", "bad");
      setReady(false, "no", "Allow camera/microphone permissions, then reload.", "bad");
    }
  })();
})();
</script>
</body>
</html>
