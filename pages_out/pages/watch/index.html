<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Relay Watch</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
body{background:#111;color:#fff;font-family:sans-serif;margin:0;padding:20px}
video{width:100%;max-width:900px;border-radius:10px;background:#000}
#status{margin-top:12px}
</style>
</head>

<body>

<h2>Live Stream</h2>

<video id="video" playsinline controls></video>

<div id="status">Loading…</div>

<script src="https://player.live-video.net/1.20.0/amazon-ivs-player.min.js"></script>

<script>

const API="https://stream-platform-api.kiwismurph.workers.dev"

const qs=new URLSearchParams(location.search)
const EVENT=qs.get("event")
const KEY=qs.get("key")

const video=document.getElementById("video")
const statusEl=document.getElementById("status")

let player
let retry=0

function log(msg){
  console.log(msg)
  statusEl.innerText=msg
}

async function getPublic(){

  const r=await fetch(
    `${API}/api/events/${EVENT}/public?key=${KEY}`
  )

  if(!r.ok) throw new Error("public failed")

  return r.json()
}

async function waitForHLS(url){

  while(true){

    try{
      const r=await fetch(url,{cache:"no-store"})
      if(r.ok) return
    }catch{}

    retry++

    log(`Stream starting… preparing video (${retry})`)

    await new Promise(r=>setTimeout(r,2000))
  }
}

function startHLS(url){

  player=IVSPlayer.create()

  player.attachHTMLVideoElement(video)

  player.addEventListener(
    IVSPlayer.PlayerState.PLAYING,
    ()=>log("LIVE")
  )

  player.addEventListener(
    IVSPlayer.PlayerEventType.ERROR,
    ()=>log("Reconnecting…")
  )

  player.load(url)
  player.play()

}

async function init(){

  log("Checking event…")

  const pub=await getPublic()

  const hls=pub.hls_url

  if(!hls){
    log("Waiting for broadcaster…")
    setTimeout(init,2000)
    return
  }

  await waitForHLS(hls)

  startHLS(hls)

}

init()

</script>

</body>
</html>
