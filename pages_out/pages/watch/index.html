<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Relay Watch</title>

  <!-- Amazon IVS Real-Time Web Broadcast SDK (Stages / WebRTC) -->
  <script src="https://web-broadcast.live-video.net/1.17.0/amazon-ivs-web-broadcast.js"></script>

  <!-- Amazon IVS Player SDK (HLS) -->
  <script src="https://player.live-video.net/1.48.0/amazon-ivs-player.min.js"></script>

  <style>
    :root { color-scheme: dark; }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; background:#0b0c10; color:#e8e8e8; margin:0; }
    header { padding:14px 16px; border-bottom:1px solid #20232a; display:flex; gap:12px; align-items:center; justify-content:space-between; }
    .title { font-weight:700; }
    .pill { font-size:12px; padding:4px 8px; border:1px solid #2b2f3a; border-radius:999px; color:#cbd5e1; }
    main { padding:14px 16px; max-width:1100px; margin:0 auto; }
    .row { display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin-bottom:10px; }
    button { background:#1f2937; border:1px solid #334155; color:#e5e7eb; padding:10px 12px; border-radius:10px; cursor:pointer; }
    button:disabled { opacity:0.55; cursor:not-allowed; }
    select, input { background:#0f172a; border:1px solid #334155; color:#e5e7eb; padding:9px 10px; border-radius:10px; }
    .card { border:1px solid #20232a; border-radius:14px; padding:12px; background:#0f1117; }
    .grid { display:grid; gap:12px; grid-template-columns:1fr; }
    @media (min-width:900px){ .grid { grid-template-columns:2fr 1fr; } }
    video { width:100%; background:#000; border-radius:12px; border:1px solid #20232a; }
    .videos { display:grid; gap:10px; grid-template-columns:repeat(auto-fit, minmax(220px, 1fr)); }
    .log { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size:12px; white-space:pre-wrap; background:#0b1220; border:1px solid #202a3a; border-radius:12px; padding:10px; max-height:240px; overflow:auto; }
    .muted { color:#a3a3a3; }
    .err { color:#ffb4b4; }
  </style>
</head>
<body>
  <header>
    <div class="title">Relay Watch</div>
    <div class="row">
      <span id="modePill" class="pill">mode: auto</span>
      <span id="statusPill" class="pill">status: —</span>
    </div>
  </header>

  <main>
    <div class="grid">
      <div class="card">
        <div class="row">
          <label class="muted">Event</label>
          <input id="eventId" style="min-width:320px" />
          <label class="muted">Key</label>
          <input id="eventKey" style="min-width:320px" />
        </div>

        <div class="row">
          <label class="muted">Playback mode</label>
          <select id="mode">
            <option value="auto">Auto</option>
            <option value="hls">HLS (IVS Player)</option>
            <option value="rtc">WebRTC (Stage)</option>
          </select>

          <button id="btnLoad">Load / Refresh</button>
          <button id="btnPlay">Play</button>
          <button id="btnStop">Stop</button>
        </div>

        <div id="errorLine" class="muted err" style="margin:6px 0 0; display:none;"></div>

        <div id="hlsWrap" style="display:none;">
          <div class="muted" style="margin:8px 0 6px;">HLS Player</div>
          <video id="hlsVideo" playsinline controls></video>
          <div class="muted" id="hlsInfo" style="margin-top:6px;"></div>
        </div>

        <div id="rtcWrap" style="display:none;">
          <div class="muted" style="margin:8px 0 6px;">WebRTC Stage</div>
          <div class="videos" id="rtcVideos"></div>
          <div class="muted" id="rtcInfo" style="margin-top:6px;"></div>
        </div>
      </div>

      <div class="card">
        <div class="row" style="justify-content:space-between;">
          <div class="muted">Logs</div>
          <button id="btnClear" style="padding:8px 10px;">Clear</button>
        </div>
        <div id="log" class="log"></div>
      </div>
    </div>
  </main>

<script>
(() => {
  // If you're serving the HTML from Pages, keep API on the Worker.
  const API_BASE =
    (location.origin.includes("pages.dev") || location.origin.includes("localhost"))
      ? "https://stream-platform-api.kiwismurph.workers.dev"
      : location.origin;

  const qs = new URLSearchParams(location.search);
  const $ = (id) => document.getElementById(id);

  const elEventId = $("eventId");
  const elEventKey = $("eventKey");
  const elMode = $("mode");
  const elModePill = $("modePill");
  const elStatusPill = $("statusPill");
  const elLog = $("log");
  const elErr = $("errorLine");

  const elHlsWrap = $("hlsWrap");
  const elRtcWrap = $("rtcWrap");
  const elHlsInfo = $("hlsInfo");
  const elRtcInfo = $("rtcInfo");
  const elRtcVideos = $("rtcVideos");

  const btnLoad = $("btnLoad");
  const btnPlay = $("btnPlay");
  const btnStop = $("btnStop");
  const btnClear = $("btnClear");

  // state
  let ev = null;

  // HLS state
  let ivsPlayer = null;
  let hlsRetryTimer = null;
  let lastStartAt = 0;

  // RTC state
  let stage = null;
  let stageToken = null;

  elEventId.value = qs.get("event") || qs.get("id") || "";
  elEventKey.value = qs.get("key") || "";
  elMode.value = (qs.get("mode") || "auto").toLowerCase();

  function showError(msg){
    elErr.style.display = msg ? "" : "none";
    elErr.textContent = msg || "";
  }

  function log(...args){
    const line = args.map(a => typeof a === "string" ? a : JSON.stringify(a)).join(" ");
    elLog.textContent += line + "\n";
    elLog.scrollTop = elLog.scrollHeight;
    console.log(...args);
  }

  btnClear.onclick = () => { elLog.textContent = ""; };

  function setStatus(text){ elStatusPill.textContent = "status: " + text; }
  function setModePill(){ elModePill.textContent = "mode: " + elMode.value; }

  function apiUrl(path){ return API_BASE + path; }

  async function fetchJson(path, init){
    const r = await fetch(apiUrl(path), init);
    const t = await r.text();
    let j = null;
    try { j = t ? JSON.parse(t) : null; } catch {}
    if(!r.ok){
      const msg = typeof j === "object" && j ? JSON.stringify(j) : t;
      const err = new Error(`${r.status} ${msg}`);
      err.status = r.status;
      err.body = j ?? t;
      throw err;
    }
    return j;
  }

  async function apiGet(path){
    return fetchJson(path, { method:"GET", credentials:"include" });
  }

  async function apiPost(path, body){
    return fetchJson(path, {
      method:"POST",
      headers:{ "content-type":"application/json" },
      body: body ? JSON.stringify(body) : "{}",
      credentials:"include"
    });
  }

  function showHls(){ elHlsWrap.style.display = ""; elRtcWrap.style.display = "none"; }
  function showRtc(){ elRtcWrap.style.display = ""; elHlsWrap.style.display = "none"; }
  function showNone(){ elRtcWrap.style.display = "none"; elHlsWrap.style.display = "none"; }

  async function loadPublic(){
    showError("");
    const eventId = elEventId.value.trim();
    const key = elEventKey.value.trim();
    if(!eventId || !key) throw new Error("Missing event or key");

    setStatus("loading…");
    setModePill();

    const pub = await apiGet(`/api/events/${encodeURIComponent(eventId)}/public?key=${encodeURIComponent(key)}`);
    ev = pub;

    setStatus(pub.status || "ok");
    log("PUBLIC", pub);

    if(elMode.value === "auto"){
      if(pub.hls_enabled && pub.playback_url) elMode.value = "hls";
      else if(pub.rtc_enabled) elMode.value = "rtc";
    }
    setModePill();

    if(elMode.value === "hls") showHls();
    else if(elMode.value === "rtc") showRtc();
    else showNone();

    return pub;
  }

  // ----------------
  // HLS (IVS Player)
  // ----------------
  function stopHls(){
    if(hlsRetryTimer){ clearTimeout(hlsRetryTimer); hlsRetryTimer = null; }
    if(ivsPlayer){
      try { ivsPlayer.pause(); } catch {}
      try { ivsPlayer.delete(); } catch {}
      ivsPlayer = null;
    }
    const v = $("hlsVideo");
    v.srcObject = null;
    v.removeAttribute("src");
    v.load();
    elHlsInfo.textContent = "";
  }

  async function ensureStartedForHls(){
    const now = Date.now();
    if(now - lastStartAt < 2500) return; // prevent /start spam
    lastStartAt = now;

    const eventId = elEventId.value.trim();
    const key = elEventKey.value.trim();

    const res = await apiPost(`/api/events/${encodeURIComponent(eventId)}/start?key=${encodeURIComponent(key)}`, {});
    log("START", res);
  }

  async function playHls(){
    if(!ev) await loadPublic();
    if(!ev.hls_enabled) throw new Error("This event is not HLS-enabled.");

    await ensureStartedForHls();
    await new Promise(r => setTimeout(r, 900));
    ev = await loadPublic();

    const playbackUrl = ev.playback_url;
    if(!playbackUrl) throw new Error("No playback_url returned yet.");
    elHlsInfo.textContent = playbackUrl;

    const videoEl = $("hlsVideo");
    // In the IVS Player SDK, isPlayerSupported is a boolean (not a function).
    if(!window.IVSPlayer || !IVSPlayer.isPlayerSupported){
      throw new Error("IVS Player not supported in this browser.");
    }

    stopHls();

    ivsPlayer = IVSPlayer.create();
    ivsPlayer.attachHTMLVideoElement(videoEl);

    const tryLoad = async (label) => {
      if(!ivsPlayer) return;
      const urlNow = (ev && ev.playback_url) ? ev.playback_url : playbackUrl;
      log(`HLS load (${label})`, urlNow);
      try{
        ivsPlayer.load(urlNow);
        ivsPlayer.play();
        setStatus("playing (hls)");
      }catch(e){
        log("HLS load/play threw", String(e));
      }
    };

    const scheduleRetry = (why) => {
      if(hlsRetryTimer) return;
      hlsRetryTimer = setTimeout(async () => {
        hlsRetryTimer = null;
        try{
          await ensureStartedForHls(); // safe/idempotent
          ev = await loadPublic();
        }catch(e){
          log("HLS retry failed", String(e));
        }
        await tryLoad(why);
      }, 2500);
    };

    ivsPlayer.addEventListener(IVSPlayer.PlayerEventType.ERROR, (err) => {
      log("IVS ERROR", err);
      setStatus("hls error");
      scheduleRetry("retry");
    });

    ivsPlayer.addEventListener(IVSPlayer.PlayerEventType.ENDED, () => {
      log("IVS ENDED");
      setStatus("hls ended");
      scheduleRetry("ended-retry");
    });

    await tryLoad("initial");
  }

  // -----------------------
  // RTC (Stage subscribe)
  // -----------------------
  function stopRtc(){
    try { stage && stage.leave(); } catch {}
    stage = null;
    stageToken = null;
    elRtcVideos.innerHTML = "";
    elRtcInfo.textContent = "";
  }

  async function rtcViewerToken(){
    // IMPORTANT: viewer uses /rtc/token (NOT /rtc/provision)
    const eventId = elEventId.value.trim();
    const key = elEventKey.value.trim();
    const res = await apiPost(`/api/events/${encodeURIComponent(eventId)}/rtc/token?key=${encodeURIComponent(key)}`, {});
    stageToken = res.participantToken || res.token || res.subscriberToken || null;
    if(!stageToken) throw new Error("No participantToken returned from /rtc/token");
    log("RTC TOKEN ok");
    return res;
  }

  function createParticipantEl(id, label){
    let wrap = document.getElementById("p_" + id);
    if(wrap) return wrap.querySelector("video");

    wrap = document.createElement("div");
    wrap.id = "p_" + id;
    wrap.className = "card";
    wrap.style.padding = "8px";

    const cap = document.createElement("div");
    cap.className = "muted";
    cap.style.marginBottom = "6px";
    cap.textContent = label || id;

    const v = document.createElement("video");
    v.autoplay = true;
    v.playsInline = true;
    v.controls = false;

    wrap.appendChild(cap);
    wrap.appendChild(v);
    elRtcVideos.appendChild(wrap);
    return v;
  }

  function removeParticipantEl(id){
    const wrap = document.getElementById("p_" + id);
    if(wrap) wrap.remove();
  }

  async function playRtc(){
    if(!ev) await loadPublic();
    if(!ev.rtc_enabled) throw new Error("This event is not RTC-enabled.");

    await rtcViewerToken();

    const sdk = window.IVSBroadcastClient;
    if(!sdk) throw new Error("IVS Web Broadcast SDK not loaded.");

    const { Stage, StageEvents, SubscribeType, StageConnectionState } = sdk;

    const strategy = {
      shouldPublishParticipant: () => false,
      stageStreamsToPublish: () => [],
      shouldSubscribeToParticipant: () => SubscribeType.AUDIO_VIDEO,
    };

    stage = new Stage(stageToken, strategy);

    stage.on(StageEvents.STAGE_CONNECTION_STATE_CHANGED, (state) => {
      log("RTC state", state);
      if(state === StageConnectionState.CONNECTED) setStatus("playing (rtc)");
      if(state === StageConnectionState.CONNECTING) setStatus("rtc connecting…");
      if(state === StageConnectionState.ERRORED) setStatus("rtc errored…");
      if(state === StageConnectionState.DISCONNECTED) setStatus("rtc disconnected");
    });

    stage.on(StageEvents.STAGE_PARTICIPANT_LEFT, (p) => {
      log("RTC left", p.id);
      removeParticipantEl(p.id);
    });

    stage.on(StageEvents.STAGE_PARTICIPANT_STREAMS_ADDED, (participant, streams) => {
      log("RTC streams added", participant.id, streams.map(s => s.streamType));
      const videoEl = createParticipantEl(participant.id, participant.info?.userInfo || participant.id);
      const ms = new MediaStream();
      streams.forEach(s => { if(s.mediaStreamTrack) ms.addTrack(s.mediaStreamTrack); });
      videoEl.srcObject = ms;
    });

    stage.on(StageEvents.STAGE_PARTICIPANT_STREAMS_REMOVED, (participant) => {
      log("RTC streams removed", participant.id);
      removeParticipantEl(participant.id);
    });

    await stage.join();
    elRtcInfo.textContent = "Connected. Waiting for broadcaster…";
  }

  // ------------
  // UI actions
  // ------------
  async function onPlay(){
    showError("");
    try{
      btnPlay.disabled = true;
      if(elMode.value === "hls") await playHls();
      else if(elMode.value === "rtc") await playRtc();
      else await loadPublic();
    }catch(e){
      log("PLAY error:", String(e));
      setStatus("error");
      showError(String(e));
    }finally{
      btnPlay.disabled = false;
    }
  }

  function onStop(){
    stopHls();
    stopRtc();
    setStatus("stopped");
    showError("");
  }

  btnLoad.onclick = async () => {
    showError("");
    try { await loadPublic(); }
    catch(e){ log("LOAD error:", String(e)); setStatus("error"); showError(String(e)); }
  };

  btnPlay.onclick = onPlay;
  btnStop.onclick = onStop;

  elMode.onchange = () => { setModePill(); showNone(); };

  // auto-load once
  (async () => {
    try{ await loadPublic(); }
    catch(e){ log("Initial load failed:", String(e)); setStatus("error"); showError(String(e)); }
  })();
})();
</script>
</body>
</html>
