<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Relay Watch</title>

  <script src="https://player.live-video.net/1.48.0/amazon-ivs-player.min.js"></script>
  <script src="https://web-broadcast.live-video.net/1.32.0/amazon-ivs-web-broadcast.js"></script>

  <style>
    :root{
      color-scheme: dark;
      --bg:#0b0c10; --panel:#0f1117; --border:#20232a; --border2:#2b2f3a;
      --text:#e8e8e8; --muted:#9ca3af;
      --good:#34d399; --warn:#fbbf24; --bad:#fb7185;
      --shadow: 0 12px 40px rgba(0,0,0,.35);
      --r:16px;
    }
    *{ box-sizing:border-box; }
    body{ margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; background:var(--bg); color:var(--text); }
    header{
      position:sticky; top:0; z-index:10;
      background: rgba(11,12,16,.92); backdrop-filter: blur(8px);
      border-bottom:1px solid var(--border);
      padding: calc(10px + env(safe-area-inset-top)) 14px 10px;
      display:flex; align-items:center; justify-content:space-between; gap:12px;
    }
    .brand{ display:flex; align-items:center; gap:10px; min-width:0; }
    .logo{ width:30px; height:30px; border-radius:10px; background:linear-gradient(135deg,#334155,#111827); border:1px solid var(--border2); box-shadow:0 6px 18px rgba(0,0,0,.25); }
    .title{ font-weight:800; line-height:1.1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .subtitle{ font-size:12px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; }
    .pill{ font-size:12px; padding:6px 10px; border:1px solid var(--border2); border-radius:999px; color:#cbd5e1; display:inline-flex; align-items:center; gap:8px; background: rgba(15,17,23,.5); }
    .dot{ width:8px; height:8px; border-radius:999px; background:#64748b; box-shadow:0 0 0 3px rgba(100,116,139,.12); }
    .pill.good .dot{ background:var(--good); box-shadow:0 0 0 3px rgba(52,211,153,.12); }
    .pill.warn .dot{ background:var(--warn); box-shadow:0 0 0 3px rgba(251,191,36,.12); }
    .pill.bad  .dot{ background:var(--bad);  box-shadow:0 0 0 3px rgba(251,113,133,.12); }

    main{ padding:14px; padding-bottom: calc(18px + env(safe-area-inset-bottom)); max-width:1100px; margin:0 auto; }
    .card{ background:var(--panel); border:1px solid var(--border); border-radius:var(--r); padding:14px; box-shadow:var(--shadow); }
    .videoWrap{ position:relative; background:#000; border-radius:14px; border:1px solid var(--border); overflow:hidden; }
    video{ width:100%; display:block; background:#000; }
    .overlay{
      position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
      text-align:center; padding:20px; background: rgba(0,0,0,.45);
      font-size:16px; font-weight:900; gap:8px;
    }
    .overlay small{ font-size:13px; color: rgba(255,255,255,.75); font-weight:500; line-height:1.35; max-width:42rem; }
    .overlay.hidden{ display:none; }
    .row{ margin-top:10px; display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; }
    .hint{ color:var(--muted); font-size:13px; }
    .controls{ display:flex; gap:10px; flex-wrap:wrap; justify-content:flex-end; }
    button{ appearance:none; border:1px solid var(--border2); background: rgba(31,41,55,.45); color:#e5e7eb; padding:10px 12px; border-radius:12px; cursor:pointer; font-weight:800; font-size:13px; }
    button.secondary{ background: transparent; }
    select{ background:#0f172a; border:1px solid var(--border2); color:var(--text); padding:10px 12px; border-radius:12px; outline:none; font-weight:800; font-size:13px; }
    details{ margin-top:12px; border-radius:14px; border:1px solid var(--border); background: rgba(15,17,23,.55); overflow:hidden; }
    summary{ cursor:pointer; padding:12px; list-style:none; display:flex; justify-content:space-between; color:var(--muted); font-size:13px; }
    summary::-webkit-details-marker{ display:none; }
    pre{ margin:0; padding:12px; white-space:pre-wrap; word-break:break-word; font-family: ui-monospace, Menlo, Consolas, monospace; font-size:12px; color:#a7b0c0; }
  </style>
</head>
<body>
<header>
  <div class="brand" id="brand">
    <div class="logo" aria-hidden="true"></div>
    <div>
      <div class="title">Relay Watch</div>
      <div class="subtitle" id="hdrSub">Loading…</div>
    </div>
  </div>
  <div style="display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end;">
    <span id="pillMode" class="pill"><span class="dot"></span><span id="modeText">—</span></span>
    <span id="pillState" class="pill warn"><span class="dot"></span><span id="stateText">STARTING</span></span>
    <span id="pillLive" class="pill bad" style="display:none;"><span class="dot"></span><span>LIVE</span></span>
  </div>
</header>

<main>
  <div class="card">
    <div class="videoWrap">
      <video id="video" playsinline controls></video>
      <div id="overlay" class="overlay">
        <div id="ovMain">Stream starting…</div>
        <small id="ovSub">Preparing…</small>
      </div>
    </div>

    <div class="row">
      <div class="hint" id="statusLine">Starting…</div>
      <div class="controls">
        <select id="modeSel">
          <option value="auto">Auto</option>
          <option value="rtc">RTC (low latency)</option>
          <option value="hls">HLS</option>
        </select>
        <button id="btnRetry" class="secondary">Retry</button>
      </div>
    </div>

    <details>
      <summary><span>Diagnostics</span><span id="diagHint">hidden</span></summary>
      <pre id="diagPre">{}</pre>
    </details>
  </div>
</main>

<script>
(() => {
  const API_BASE =
    (location.origin.includes("pages.dev") || location.origin.includes("localhost"))
      ? "https://stream-platform-api.kiwismurph.workers.dev"
      : location.origin;

  const qs = new URLSearchParams(location.search);
  const eventId = qs.get("event") || qs.get("id") || "";
  const key = qs.get("key") || "";
  const wl = qs.get("wl") === "1";
  const modeFromUrl = (qs.get("mode") || "").toLowerCase();

  const $ = (id)=>document.getElementById(id);
  const videoEl = $("video");
  const hdrSub = $("hdrSub");
  const statusLine = $("statusLine");
  const ov = $("overlay");
  const ovMain = $("ovMain");
  const ovSub = $("ovSub");
  const modeSel = $("modeSel");
  const btnRetry = $("btnRetry");
  const brand = $("brand");

  const pillMode = $("pillMode");
  const modeText = $("modeText");
  const pillState = $("pillState");
  const stateText = $("stateText");
  const pillLive = $("pillLive");

  const diagPre = $("diagPre");
  const diagHint = $("diagHint");
  const details = document.querySelector("details");

  if(wl) brand.style.display = "none";
  details.addEventListener("toggle", () => { diagHint.textContent = details.open ? "shown" : "hidden"; });

  function setPill(el, kind){
    el.classList.remove("good","warn","bad");
    if(kind) el.classList.add(kind);
  }
  function setMode(text, kind){
    modeText.textContent = text;
    setPill(pillMode, kind);
  }
  function setState(text, kind, line){
    stateText.textContent = text;
    setPill(pillState, kind);
    if(line) statusLine.textContent = line;
  }
  function setLive(on){ pillLive.style.display = on ? "" : "none"; }

  function showOverlay(main, sub){
    ov.classList.remove("hidden");
    ovMain.textContent = main;
    ovSub.textContent = sub || "";
  }
  function hideOverlay(){ ov.classList.add("hidden"); }

  function api(path){ return API_BASE + path; }

  async function fetchJson(url, init){
    const r = await fetch(url, init);
    const t = await r.text();
    let j = null;
    try { j = t ? JSON.parse(t) : null; } catch {}
    if(!r.ok) throw new Error(`${r.status} ${t}`);
    return j;
  }

  async function getPublic(){
    return fetchJson(api(`/api/events/${encodeURIComponent(eventId)}/public?key=${encodeURIComponent(key)}`), { cache:"no-store" });
  }

  async function postStartNonFatal(){
    try{
      await fetchJson(api(`/api/events/${encodeURIComponent(eventId)}/start?key=${encodeURIComponent(key)}`), {
        method:"POST", headers:{ "content-type":"application/json" }, body:"{}", credentials:"include"
      });
    }catch{}
  }

  async function postProvision(){
    return fetchJson(api(`/api/events/${encodeURIComponent(eventId)}/rtc/provision?key=${encodeURIComponent(key)}`), {
      method:"POST", headers:{ "content-type":"application/json" }, body:"{}", credentials:"include"
    });
  }

  function pickHlsUrl(pub){
    if(!pub || typeof pub !== "object") return null;
    const candidates = [
      pub.playback_url,           // ✅ your backend uses this
      pub.hls_url,
      pub.hlsUrl,
      pub.playbackUrl,
      pub.channel_playback_url,
      pub.channelPlaybackUrl,
      pub?.hls?.url,
      pub?.playback?.hls,
      pub?.outputs?.hls,
    ];
    for(const u of candidates){
      if(typeof u === "string" && u.startsWith("http")) return u;
    }
    return null;
  }

  // Robust token pick: handles string token or nested objects
  function pickRtcToken(prov){
    if(!prov || typeof prov !== "object") return null;

    const candidates = [
      prov.participantToken,
      prov.token,
      prov.publisher?.token,
      prov.viewer?.token,
      prov.subscriber?.token
    ];

    for(const c of candidates){
      if(typeof c === "string" && c.length > 20) return c;
      if(c && typeof c === "object"){
        if(typeof c.token === "string") return c.token;
        if(typeof c.value === "string") return c.value;
      }
    }
    return null;
  }

  async function probeOk(url){
    try{
      const r = await fetch(url, { cache:"no-store" });
      return r.ok;
    }catch{
      return false;
    }
  }

  // RTC watch
  let rtcStage = null;
  let rtcNoStreamsTimer = null;

  function stopRTC(){
    try{ rtcStage && rtcStage.leave(); }catch{}
    rtcStage = null;
    if(rtcNoStreamsTimer) clearTimeout(rtcNoStreamsTimer);
    rtcNoStreamsTimer = null;
  }

  async function startRTC(){
    const sdk = window.IVSBroadcastClient;
    if(!sdk) throw new Error("IVS RTC SDK missing");

    const { Stage, StageEvents, SubscribeType, StageConnectionState } = sdk;

    setMode("RTC","good");
    showOverlay("Connecting…","Starting low-latency stream");
    setState("CONNECTING","warn","Connecting (RTC)…");
    setLive(false);

    const prov = await postProvision();
    const token = pickRtcToken(prov);
    if(!token) throw new Error("No RTC token returned from /rtc/provision");

    const strategy = {
      shouldSubscribeToParticipant(){ return SubscribeType.AUDIO_VIDEO; },
      shouldPublishParticipant(){ return false; },
      stageStreamsToPublish(){ return []; }
    };

    rtcStage = new Stage(token, strategy);

    rtcStage.on(StageEvents.STAGE_CONNECTION_STATE_CHANGED, (st) => {
      if(st === StageConnectionState.CONNECTING){
        showOverlay("Connecting…","Hold tight");
        setState("CONNECTING","warn","Connecting (RTC)…");
      } else if(st === StageConnectionState.CONNECTED){
        setState("LIVE","good","Connected (RTC) — waiting for broadcaster…");
        showOverlay("Waiting for broadcaster…","RTC is connected. Video appears when the broadcaster is live.");
        // If nothing arrives after 10s, keep message (don’t look broken)
        if(rtcNoStreamsTimer) clearTimeout(rtcNoStreamsTimer);
        rtcNoStreamsTimer = setTimeout(() => {
          showOverlay("Waiting for broadcaster…","If the broadcaster is already live, hit Retry.");
        }, 10000);
      } else if(st === StageConnectionState.ERRORED){
        showOverlay("Reconnecting…","RTC hiccup — retrying");
        setState("CONNECTING","warn","Reconnecting (RTC)…");
      } else if(st === StageConnectionState.DISCONNECTED){
        showOverlay("Stream unavailable","RTC disconnected. Hit Retry.");
        setState("WAITING","warn","Disconnected (RTC).");
        setLive(false);
      }
    });

    rtcStage.on(StageEvents.STAGE_PARTICIPANT_STREAMS_ADDED, (_p, streams) => {
      const ms = new MediaStream();
      for(const s of streams){
        if(s?.mediaStreamTrack) ms.addTrack(s.mediaStreamTrack);
      }
      videoEl.srcObject = ms;
      videoEl.play().catch(()=>{});
      hideOverlay();
      setLive(true);
      setState("LIVE","good","Live now.");
      if(rtcNoStreamsTimer) clearTimeout(rtcNoStreamsTimer);
      rtcNoStreamsTimer = null;
    });

    // Join with timeout so we don’t hang forever
    const joinPromise = rtcStage.join();
    const timeoutPromise = new Promise((_, rej) => setTimeout(() => rej(new Error("RTC join timed out")), 12000));
    await Promise.race([joinPromise, timeoutPromise]);
  }

  // HLS watch
  let hlsPlayer = null;
  function stopHLS(){ try{ hlsPlayer && hlsPlayer.pause(); }catch{} try{ hlsPlayer && hlsPlayer.delete(); }catch{} hlsPlayer = null; }

  async function startHLS(hlsUrl){
    if(!window.IVSPlayer || !IVSPlayer.isPlayerSupported){
      showOverlay("Browser not supported","IVS Player not supported here.");
      return;
    }

    setMode("HLS","warn");
    setState("STARTING","warn","Preparing video…");
    showOverlay("Stream starting…","Preparing video (this can take ~60s)");
    setLive(false);

    let attempt = 0;
    while(true){
      attempt++;
      if(await probeOk(hlsUrl)) break;
      showOverlay("Stream starting…", `Preparing video… retrying in 2s (attempt ${attempt})`);
      await new Promise(r=>setTimeout(r, 2000));
    }

    stopHLS();
    hlsPlayer = IVSPlayer.create();
    hlsPlayer.attachHTMLVideoElement(videoEl);

    hlsPlayer.addEventListener(IVSPlayer.PlayerState.PLAYING, () => {
      hideOverlay();
      setLive(true);
      setState("LIVE","good","Live now.");
    });

    hlsPlayer.addEventListener(IVSPlayer.PlayerEventType.ERROR, () => {
      showOverlay("Reconnecting…","Recovering playback");
      setLive(false);
      setTimeout(() => startHLS(hlsUrl), 2000);
    });

    hlsPlayer.load(hlsUrl);
    hlsPlayer.play().catch(()=>{});
  }

  function applyModeOptions(pub){
    const rtcEnabled = pub?.rtc_enabled !== false && !!pub?.rtc_stage_arn;
    const hlsEnabled = !!pub?.hls_enabled || !!pickHlsUrl(pub);

    // Disable invalid options
    modeSel.querySelector('option[value="rtc"]').disabled = !rtcEnabled;
    modeSel.querySelector('option[value="hls"]').disabled = !hlsEnabled;

    // Default mode: be specific
    let defaultMode = "auto";
    if(rtcEnabled && !hlsEnabled) defaultMode = "rtc";
    else if(hlsEnabled && !rtcEnabled) defaultMode = "hls";
    else defaultMode = "auto";

    // URL override if valid for this event
    let chosen = defaultMode;
    if(["auto","rtc","hls"].includes(modeFromUrl)){
      if(modeFromUrl === "rtc" && rtcEnabled) chosen = "rtc";
      else if(modeFromUrl === "hls" && hlsEnabled) chosen = "hls";
      else if(modeFromUrl === "auto") chosen = "auto";
    }

    modeSel.value = chosen;
  }

  let runId = 0;
  async function start(){
    const my = ++runId;

    if(!eventId || !key){
      showOverlay("Invalid link","Missing event or key.");
      setState("ERROR","bad","Missing event or key.");
      return;
    }

    stopRTC(); stopHLS();
    videoEl.srcObject = null;

    setState("STARTING","warn","Checking event…");
    showOverlay("Stream starting…","Checking event details…");

    // Warm /start early (idempotent) – helps HLS spin-up
    postStartNonFatal();

    let pub = null;
    try{
      pub = await getPublic();
    }catch{
      showOverlay("Loading…","Retrying…");
      setTimeout(start, 2000);
      return;
    }
    if(my !== runId) return;

    diagPre.textContent = JSON.stringify(pub, null, 2);
    hdrSub.textContent = pub?.title ? pub.title : "Relay";

    applyModeOptions(pub);

    const want = (modeSel.value || "auto").toLowerCase();
    const rtcEnabled = pub?.rtc_enabled !== false && !!pub?.rtc_stage_arn;
    const hlsUrl = pickHlsUrl(pub);
    const hlsEnabled = !!pub?.hls_enabled || !!hlsUrl;

    if(want === "rtc"){
      if(!rtcEnabled){
        showOverlay("RTC unavailable","This event is not enabled for RTC.");
        setState("ERROR","bad","RTC unavailable.");
        return;
      }
      try{
        await startRTC();
      }catch(e){
        showOverlay("RTC not ready","Hit Retry in a moment.");
        setState("WAITING","warn", "RTC not ready.");
      }
      return;
    }

    if(want === "hls"){
      if(!hlsEnabled || !hlsUrl){
        showOverlay("Stream starting…","Waiting for HLS output…");
        setState("WAITING","warn","Waiting for HLS…");
        setTimeout(start, 2000);
        return;
      }
      await startHLS(hlsUrl);
      return;
    }

    // AUTO: pick best available for this event (not generic auto)
    if(rtcEnabled){
      try{ await startRTC(); return; }catch{}
    }
    if(hlsEnabled && hlsUrl){
      await startHLS(hlsUrl); return;
    }

    showOverlay("Stream starting…","Waiting for broadcaster…");
    setState("WAITING","warn","Waiting for stream…");
    setTimeout(start, 2000);
  }

  btnRetry.onclick = start;
  modeSel.addEventListener("change", start);

  start();
})();
</script>
</body>
</html>
