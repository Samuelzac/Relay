<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Relay Watch</title>

  <script src="https://web-broadcast.live-video.net/1.17.0/amazon-ivs-web-broadcast.js"></script>
  <script src="https://player.live-video.net/1.48.0/amazon-ivs-player.min.js"></script>

  <style>
    :root{
      color-scheme: dark;
      --bg:#0b0c10;
      --panel:#0f1117;
      --border:#20232a;
      --border2:#334155;
      --text:#e8e8e8;
      --muted:#a3a3a3;
      --good:#1f6f4a;
      --warn:#7a5a0a;
      --bad:#7c2d38;
      --btn:#1f2937;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
    header{
      position:sticky;top:0;z-index:20;padding:14px 16px;border-bottom:1px solid var(--border);
      background:rgba(11,12,16,.96);backdrop-filter: blur(10px);display:flex;gap:12px;align-items:center;justify-content:space-between
    }
    .title{font-weight:700}
    .top-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
    .pill{font-size:12px;padding:6px 10px;border:1px solid var(--border2);border-radius:999px;color:#cbd5e1;background:#0f172a;white-space:nowrap}
    .pill.good{border-color:var(--good);color:#bff7de}
    .pill.warn{border-color:var(--warn);color:#ffe3a3}
    .pill.bad{border-color:var(--bad);color:#ffb4b4}
    .icon-btn, button.action{border:1px solid var(--border2);background:var(--btn);color:var(--text);cursor:pointer}
    .icon-btn{width:38px;height:38px;border-radius:10px;font-size:18px;line-height:1}
    main{max-width:1100px;margin:0 auto;padding:14px 16px 24px}
    .card{border:1px solid var(--border);border-radius:16px;background:var(--panel);padding:12px}
    .controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:12px}
    .left-controls,.right-controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    select,button,input{font:inherit}
    select,input{background:#0f172a;border:1px solid var(--border2);color:var(--text);padding:10px 12px;border-radius:10px}
    button.action{padding:10px 14px;border-radius:10px}
    button.action:disabled{opacity:.55;cursor:not-allowed}
    .player-wrap{position:relative;width:100%;min-height:360px;background:#000;border:1px solid var(--border);border-radius:14px;overflow:hidden}
    video.main-video{width:100%;min-height:360px;display:block;background:#000;object-fit:contain}
    #rtcWrap{display:none}
    .rtc-stage-frame{position:relative;width:100%;min-height:360px;background:#000;border-radius:14px;overflow:hidden}
    .rtc-empty{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;text-align:center;color:var(--muted);font-size:14px;padding:20px;pointer-events:none;z-index:1}
    .videos{position:relative;z-index:2;display:grid;gap:10px;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));padding:10px;min-height:360px}
    .rtc-tile{border:1px solid var(--border);border-radius:12px;background:#0b1220;overflow:hidden;min-height:240px;display:flex;flex-direction:column}
    .rtc-cap{color:var(--muted);font-size:12px;padding:8px 10px 0 10px}
    .rtc-video{width:100%;flex:1 1 auto;min-height:220px;background:#000;object-fit:contain;display:block;border:0}
    .status-line{margin-top:10px;min-height:20px;color:var(--muted);font-size:13px}
    .error-line{color:#ffb4b4;margin-top:8px;min-height:18px;font-size:13px;white-space:pre-wrap}
    .drawer{position:fixed;top:0;right:0;width:min(92vw,380px);height:100svh;background:#0d1118;border-left:1px solid var(--border);box-shadow:-10px 0 30px rgba(0,0,0,.35);transform:translateX(100%);transition:transform .22s ease;z-index:40;display:flex;flex-direction:column}
    .drawer.open{transform:translateX(0)}
    .drawer-head{padding:14px 14px 10px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:10px}
    .drawer-body{padding:14px;overflow:auto;display:grid;gap:14px}
    .field{display:grid;gap:6px}
    .label{font-size:12px;color:var(--muted)}
    .log{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12px;white-space:pre-wrap;background:#0b1220;border:1px solid #202a3a;border-radius:12px;padding:10px;min-height:180px;max-height:42svh;overflow:auto}
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);opacity:0;pointer-events:none;transition:opacity .2s ease;z-index:30}
    .overlay.open{opacity:1;pointer-events:auto}
    @media (max-width:760px){
      header{align-items:flex-start}
      .left-controls,.right-controls{width:100%}
      .left-controls > *, .right-controls > *{flex:1 1 auto}
      .player-wrap,.rtc-stage-frame,video.main-video{min-height:240px}
      .videos{min-height:240px;grid-template-columns:1fr}
      .rtc-tile{min-height:200px}
      .rtc-video{min-height:180px}
    }
  </style>
</head>
<body>
  <header>
    <div class="title">Relay Watch</div>
    <div class="top-right">
      <span id="modePill" class="pill">mode: auto</span>
      <span id="statusPill" class="pill">status: —</span>
      <span id="readyPill" class="pill warn">ready: checking…</span>
      <button id="menuBtn" class="icon-btn" aria-label="Open menu">☰</button>
    </div>
  </header>

  <main>
    <div class="card">
      <div class="controls">
        <div class="left-controls">
          <select id="mode">
            <option value="auto">Auto</option>
            <option value="hls">HLS</option>
            <option value="rtc">RTC</option>
          </select>
        </div>
        <div class="right-controls">
          <button id="btnLoad" class="action">Load / Refresh</button>
          <button id="btnPlay" class="action" disabled>Play</button>
          <button id="btnStop" class="action">Stop</button>
        </div>
      </div>

      <div id="hlsWrap" class="player-wrap">
        <video id="hlsVideo" class="main-video" playsinline controls></video>
      </div>

      <div id="rtcWrap" class="player-wrap">
        <div class="rtc-stage-frame">
          <div id="rtcEmpty" class="rtc-empty">Waiting for broadcaster…</div>
          <div id="rtcVideos" class="videos"></div>
        </div>
      </div>

      <div id="statusLine" class="status-line"></div>
      <div id="errorLine" class="error-line"></div>
    </div>
  </main>

  <div id="overlay" class="overlay"></div>

  <aside id="drawer" class="drawer" aria-hidden="true">
    <div class="drawer-head">
      <strong>Details</strong>
      <button id="closeDrawerBtn" class="icon-btn" aria-label="Close menu">✕</button>
    </div>
    <div class="drawer-body">
      <div class="field">
        <div class="label">Event ID</div>
        <input id="eventId" />
      </div>
      <div class="field">
        <div class="label">Key</div>
        <input id="eventKey" />
      </div>
      <div class="field">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;">
          <div class="label">Logs</div>
          <button id="btnClear" class="action">Clear</button>
        </div>
        <div id="log" class="log"></div>
      </div>
    </div>
  </aside>

<script>
(() => {
  const API_BASE = (location.origin.includes("pages.dev") || location.origin.includes("localhost"))
    ? "https://stream-platform-api.kiwismurph.workers.dev"
    : location.origin;

  const qs = new URLSearchParams(location.search);
  const $ = (id) => document.getElementById(id);

  const elEventId = $("eventId");
  const elEventKey = $("eventKey");
  const elMode = $("mode");
  const elModePill = $("modePill");
  const elStatusPill = $("statusPill");
  const elReadyPill = $("readyPill");
  const elStatusLine = $("statusLine");
  const elError = $("errorLine");
  const elLog = $("log");
  const elHlsWrap = $("hlsWrap");
  const elRtcWrap = $("rtcWrap");
  const elRtcEmpty = $("rtcEmpty");
  const elRtcVideos = $("rtcVideos");
  const elHlsVideo = $("hlsVideo");
  const btnLoad = $("btnLoad");
  const btnPlay = $("btnPlay");
  const btnStop = $("btnStop");
  const btnClear = $("btnClear");
  const btnMenu = $("menuBtn");
  const btnCloseDrawer = $("closeDrawerBtn");
  const drawer = $("drawer");
  const overlay = $("overlay");

  let ev = null;
  let readinessState = { ready:false, reason:"Checking event…" };
  let readinessTimer = null;
  let currentReadiness = null;
  let ivsPlayer = null;
  let hlsRetryTimer = null;
  let stage = null;
  let stageToken = null;
  const rtcParticipantStreams = new Map();

  elEventId.value = qs.get("event") || qs.get("id") || "";
  elEventKey.value = qs.get("key") || "";
  elMode.value = (qs.get("mode") || "auto").toLowerCase();

  function openDrawer(){ drawer.classList.add("open"); overlay.classList.add("open"); drawer.setAttribute("aria-hidden","false"); }
  function closeDrawer(){ drawer.classList.remove("open"); overlay.classList.remove("open"); drawer.setAttribute("aria-hidden","true"); }
  function showError(msg){ elError.textContent = msg || ""; }
  function log(...args){ const line = args.map(a => typeof a === "string" ? a : JSON.stringify(a)).join(" "); elLog.textContent += line + "\\n"; elLog.scrollTop = elLog.scrollHeight; console.log(...args); }
  function setStatus(text, kind){ elStatusPill.className = "pill " + (kind || ""); elStatusPill.textContent = "status: " + text; }
  function setModePill(){ elModePill.textContent = "mode: " + elMode.value; }
  function setReadyPill(ready, text, kind){ elReadyPill.className = "pill " + (kind || (ready ? "good" : "warn")); elReadyPill.textContent = "ready: " + text; }
  function setReadyState(ready, reason, kind){ readinessState = { ready, reason }; btnPlay.disabled = !ready; elStatusLine.textContent = reason || ""; setReadyPill(ready, ready ? "yes" : "no", kind); }
  function apiUrl(path){ return API_BASE + path; }

  async function fetchJson(path, init){
    const r = await fetch(apiUrl(path), init);
    const t = await r.text();
    let j = null; try { j = t ? JSON.parse(t) : null; } catch {}
    if(!r.ok){
      const msg = typeof j === "object" && j ? JSON.stringify(j) : t;
      const err = new Error(`${r.status} ${msg}`);
      err.status = r.status; err.body = j ?? t; throw err;
    }
    return j;
  }
  async function apiGet(path){ return fetchJson(path, { method:"GET", credentials:"include", cache:"no-store" }); }
  async function apiPost(path, body){ return fetchJson(path, { method:"POST", headers:{ "content-type":"application/json" }, body: body ? JSON.stringify(body) : "{}", credentials:"include" }); }

  function showHls(){ elHlsWrap.style.display = ""; elRtcWrap.style.display = "none"; }
  function showRtc(){ elRtcWrap.style.display = ""; elHlsWrap.style.display = "none"; }
  function showNone(){ elRtcWrap.style.display = "none"; elHlsWrap.style.display = "none"; }

  function applyModeForEvent(pub){
    const rtcEnabled = !!pub?.rtc_enabled;
    const hlsEnabled = !!pub?.hls_enabled;
    const optRtc = elMode.querySelector('option[value="rtc"]');
    const optHls = elMode.querySelector('option[value="hls"]');
    if(optRtc) optRtc.disabled = !rtcEnabled;
    if(optHls) optHls.disabled = !hlsEnabled;
    if(qs.get("mode")) return;
    if(elMode.value === "auto"){
      if(hlsEnabled) elMode.value = "hls";
      else if(rtcEnabled) elMode.value = "rtc";
    }
  }

  async function loadPublic(){
    showError("");
    const eventId = elEventId.value.trim();
    const key = elEventKey.value.trim();
    if(!eventId || !key) throw new Error("Missing event or key");
    setStatus("loading…", "warn");
    setModePill();
    const pub = await apiGet(`/api/events/${encodeURIComponent(eventId)}/public?key=${encodeURIComponent(key)}`);
    ev = pub;
    setStatus(pub.status || "ok", pub.expired ? "bad" : "");
    log("PUBLIC", pub);
    applyModeForEvent(pub);
    setModePill();
    if(elMode.value === "hls") showHls(); else if(elMode.value === "rtc") showRtc(); else showNone();
    return pub;
  }

  async function loadReadiness(){
    const eventId = elEventId.value.trim();
    const key = elEventKey.value.trim();
    const res = await apiGet(`/api/events/${encodeURIComponent(eventId)}/readiness?key=${encodeURIComponent(key)}`);
    currentReadiness = res?.readiness || null;
    return res;
  }

  function stopReadinessPolling(){ if(readinessTimer){ clearTimeout(readinessTimer); readinessTimer = null; } }
  function scheduleReadiness(ms = 2500){
    stopReadinessPolling();
    readinessTimer = setTimeout(() => {
      readinessTimer = null;
      refreshReadiness().catch(e => { log("Readiness polling error", String(e)); scheduleReadiness(2500); });
    }, ms);
  }

  function stopHls(){
    if(hlsRetryTimer){ clearTimeout(hlsRetryTimer); hlsRetryTimer = null; }
    if(ivsPlayer){ try { ivsPlayer.pause(); } catch {} try { ivsPlayer.delete(); } catch {} ivsPlayer = null; }
    elHlsVideo.srcObject = null;
    elHlsVideo.removeAttribute("src");
    elHlsVideo.load();
  }

  function updateRtcEmptyState(){ elRtcEmpty.style.display = elRtcVideos.children.length ? "none" : ""; }
  function clearRtcTiles(){ rtcParticipantStreams.clear(); elRtcVideos.innerHTML = ""; updateRtcEmptyState(); }
  function stopRtc(){ try { stage && stage.leave(); } catch {} stage = null; stageToken = null; clearRtcTiles(); }

  async function probePlayback(url){
    try{ const r = await fetch(url, { method:"GET", cache:"no-store" }); return r.ok; }
    catch(e){ log("PLAYBACK probe failed", String(e)); return false; }
  }

  function isPlayerSupportedSafe(){
    if(!window.IVSPlayer) return false;
    try{
      if(typeof IVSPlayer.isPlayerSupported === "function") return !!IVSPlayer.isPlayerSupported();
      if(typeof IVSPlayer.isPlayerSupported === "boolean") return IVSPlayer.isPlayerSupported;
    }catch(e){ log("IVS support check failed", String(e)); }
    return typeof IVSPlayer.create === "function";
  }

  async function refreshReadiness(){
    showError("");
    try{
      ev = await loadPublic();
      const readyRes = await loadReadiness();
      const readiness = readyRes?.readiness || null;

      if(!readiness){ setReadyState(false, "Checking event…", "warn"); scheduleReadiness(2500); return; }
      if(readiness.expired){ setStatus("expired", "bad"); setReadyState(false, "Event has expired.", "bad"); return; }
      if(!readiness.paid){ setStatus("awaiting payment", "warn"); setReadyState(false, readiness.detail || "Waiting for payment confirmation.", "warn"); scheduleReadiness(2500); return; }

      if(elMode.value === "hls"){
        if(!ev.hls_enabled){ setReadyState(false, "This event is not HLS-enabled.", "bad"); return; }
        if(!readiness.playback_url_exists){ setStatus("waiting for stream", "warn"); setReadyState(false, "Waiting for stream.", "warn"); scheduleReadiness(2500); return; }
        const playbackReady = await probePlayback(readiness.playback_url);
        if(!playbackReady){
          setStatus(readiness.composition_started ? "stream detected" : "waiting for stream", readiness.composition_started ? "good" : "warn");
          setReadyState(false, readiness.composition_started ? "Stream detected. Preparing playlist…" : "Waiting for stream.", readiness.composition_started ? "good" : "warn");
          scheduleReadiness(2500); return;
        }
        setStatus("live", "good");
        setReadyState(true, "HLS is ready to watch.", "good");
        return;
      }

      if(elMode.value === "rtc"){
        if(!ev.rtc_enabled){ setReadyState(false, "This event is not RTC-enabled.", "bad"); return; }
        if(!readiness.can_watch_rtc){ setStatus("waiting for stream", "warn"); setReadyState(false, readiness.detail || "Waiting for stream.", "warn"); scheduleReadiness(2500); return; }
        try{
          await rtcViewerToken(true);
          setStatus("stream detected", "good");
          setReadyState(true, "RTC is ready. Click Play to connect.", "good");
        }catch(e){
          setStatus("preparing", "warn");
          setReadyState(false, "Preparing RTC viewer access…", "warn");
          log("RTC readiness failed", String(e));
          scheduleReadiness(2500);
        }
        return;
      }

      if(ev.hls_enabled){ elMode.value = "hls"; setModePill(); return refreshReadiness(); }
      if(ev.rtc_enabled){ elMode.value = "rtc"; setModePill(); return refreshReadiness(); }
      setReadyState(false, "Choose a playback mode.", "warn");
    } catch(e){
      log("READINESS error", String(e));
      setStatus("error", "bad");
      setReadyState(false, String(e), "bad");
      scheduleReadiness(2500);
    }
  }

  async function playHls(){
    if(!ev) await loadPublic();
    if(!currentReadiness) await loadReadiness();
    if(!ev.hls_enabled) throw new Error("This event is not HLS-enabled.");
    const playbackUrl = currentReadiness?.playback_url || ev.playback_url;
    if(!playbackUrl) throw new Error("No playback_url returned yet.");
    if(!isPlayerSupportedSafe()) throw new Error("IVS Player not supported in this browser.");

    stopHls();
    ivsPlayer = IVSPlayer.create();
    ivsPlayer.attachHTMLVideoElement(elHlsVideo);

    const tryLoad = async (label) => {
      if(!ivsPlayer) return;
      const urlNow = (currentReadiness && currentReadiness.playback_url) ? currentReadiness.playback_url : playbackUrl;
      log(`HLS load (${label})`, urlNow);
      try{ ivsPlayer.load(urlNow); await ivsPlayer.play(); setStatus("playing", "good"); }
      catch(e){ log("HLS load/play threw", String(e)); }
    };

    const scheduleRetry = (why) => {
      if(hlsRetryTimer) return;
      hlsRetryTimer = setTimeout(async () => {
        hlsRetryTimer = null;
        try{ await refreshReadiness(); } catch(e){ log("HLS retry failed", String(e)); }
        await tryLoad(why);
      }, 2500);
    };

    ivsPlayer.addEventListener(IVSPlayer.PlayerEventType.ERROR, (err) => { log("IVS ERROR", err); setStatus("retrying", "warn"); scheduleRetry("retry"); });
    ivsPlayer.addEventListener(IVSPlayer.PlayerEventType.ENDED, () => { log("IVS ENDED"); setStatus("ended", "warn"); scheduleRetry("ended-retry"); });
    ivsPlayer.addEventListener(IVSPlayer.PlayerState.PLAYING, () => { setStatus("live", "good"); showError(""); setReadyState(true, "HLS is ready to watch.", "good"); });

    await tryLoad("initial");
  }

  async function rtcViewerToken(silent = false){
    const eventId = elEventId.value.trim();
    const key = elEventKey.value.trim();
    const res = await apiPost(`/api/events/${encodeURIComponent(eventId)}/rtc/token?key=${encodeURIComponent(key)}`, {});
    stageToken = res.participantToken || res.token || res.subscriberToken || null;
    if(!stageToken) throw new Error("No participantToken returned from /rtc/token");
    if(!silent) log("RTC TOKEN ok");
    return res;
  }

  function ensureParticipantTile(id, label){
    let wrap = document.getElementById("p_" + id);
    let videoEl = wrap ? wrap.querySelector("video") : null;
    if(!wrap){
      wrap = document.createElement("div");
      wrap.id = "p_" + id;
      wrap.className = "rtc-tile";
      const cap = document.createElement("div");
      cap.className = "rtc-cap";
      cap.textContent = label || id;
      videoEl = document.createElement("video");
      videoEl.className = "rtc-video";
      videoEl.autoplay = true;
      videoEl.playsInline = true;
      videoEl.controls = true;
      videoEl.muted = true;
      wrap.appendChild(cap);
      wrap.appendChild(videoEl);
      elRtcVideos.appendChild(wrap);
    }
    updateRtcEmptyState();
    return videoEl;
  }

  function removeParticipantEl(id){
    const wrap = document.getElementById("p_" + id);
    if(wrap) wrap.remove();
    rtcParticipantStreams.delete(id);
    updateRtcEmptyState();
  }

  function rebuildParticipantMedia(participant, streams){
    const id = participant.id;
    const label = participant.info?.userInfo || participant.id;
    const trackMap = rtcParticipantStreams.get(id) || new Map();
    for(const s of streams){
      if(s && s.mediaStreamTrack){
        const key = s.mediaStreamTrack.id || `${s.mediaStreamTrack.kind}_${Math.random()}`;
        trackMap.set(key, s.mediaStreamTrack);
      }
    }
    rtcParticipantStreams.set(id, trackMap);
    const mediaStream = new MediaStream();
    for(const track of trackMap.values()){
      try { mediaStream.addTrack(track); } catch {}
    }
    const videoEl = ensureParticipantTile(id, label);
    videoEl.srcObject = mediaStream;
    videoEl.play().then(() => {
      log("RTC play ok", id, [...trackMap.values()].map(t => `${t.kind}:${t.readyState}`));
    }).catch((err) => {
      log("RTC play blocked", id, String(err));
    });
  }

  function removeParticipantTracks(participant, streams){
    const id = participant.id;
    const trackMap = rtcParticipantStreams.get(id);
    if(!trackMap) return;
    for(const s of streams){
      if(s && s.mediaStreamTrack){
        const key = s.mediaStreamTrack.id;
        if(key) trackMap.delete(key);
      }
    }
    if(trackMap.size === 0){ removeParticipantEl(id); return; }
    rtcParticipantStreams.set(id, trackMap);
    const mediaStream = new MediaStream();
    for(const track of trackMap.values()){
      try { mediaStream.addTrack(track); } catch {}
    }
    const wrap = document.getElementById("p_" + id);
    const videoEl = wrap ? wrap.querySelector("video") : null;
    if(videoEl){ videoEl.srcObject = mediaStream; videoEl.play().catch(() => {}); }
    updateRtcEmptyState();
  }

  async function playRtc(){
    if(!ev) await loadPublic();
    if(!ev.rtc_enabled) throw new Error("This event is not RTC-enabled.");
    await rtcViewerToken();
    const sdk = window.IVSBroadcastClient;
    if(!sdk) throw new Error("IVS Web Broadcast SDK not loaded.");

    stopRtc();

    const { Stage, StageEvents, SubscribeType, StageConnectionState } = sdk;
    const strategy = {
      shouldPublishParticipant: () => false,
      stageStreamsToPublish: () => [],
      shouldSubscribeToParticipant: () => SubscribeType.AUDIO_VIDEO,
    };

    stage = new Stage(stageToken, strategy);

    stage.on(StageEvents.STAGE_CONNECTION_STATE_CHANGED, (state) => {
      log("RTC state", state);
      if(state === StageConnectionState.CONNECTED) { setStatus("live", "good"); elStatusLine.textContent = "Connected. Waiting for broadcaster…"; }
      if(state === StageConnectionState.CONNECTING) setStatus("connecting", "warn");
      if(state === StageConnectionState.ERRORED) setStatus("errored", "warn");
      if(state === StageConnectionState.DISCONNECTED) setStatus("disconnected", "bad");
    });

    stage.on(StageEvents.STAGE_PARTICIPANT_LEFT, (p) => {
      log("RTC left", p.id);
      removeParticipantEl(p.id);
    });

    stage.on(StageEvents.STAGE_PARTICIPANT_STREAMS_ADDED, (participant, streams) => {
      log("RTC streams added", participant.id, streams.map(s => ({ streamType: s.streamType, kind: s.mediaStreamTrack?.kind, id: s.mediaStreamTrack?.id })));
      rebuildParticipantMedia(participant, streams);
      elStatusLine.textContent = "Receiving RTC media.";
      setStatus("live", "good");
    });

    stage.on(StageEvents.STAGE_PARTICIPANT_STREAMS_REMOVED, (participant, streams) => {
      log("RTC streams removed", participant.id, (streams || []).map(s => s.mediaStreamTrack?.id));
      removeParticipantTracks(participant, streams || []);
    });

    await stage.join();
    elStatusLine.textContent = "Connected. Waiting for broadcaster…";
    updateRtcEmptyState();
  }

  async function onPlay(){
    showError("");
    try{
      btnPlay.disabled = true;
      if(elMode.value === "hls") await playHls();
      else if(elMode.value === "rtc") await playRtc();
      else await loadPublic();
    }catch(e){
      log("PLAY error:", String(e));
      setStatus("error", "bad");
      showError(String(e));
      await refreshReadiness().catch(() => {});
    }finally{
      btnPlay.disabled = !readinessState.ready;
    }
  }

  function onStop(){ stopHls(); stopRtc(); setStatus("stopped", "warn"); showError(""); }

  btnLoad.onclick = async () => {
    showError("");
    stopReadinessPolling();
    try{ await loadPublic(); await refreshReadiness(); }
    catch(e){ log("LOAD error:", String(e)); setStatus("error", "bad"); showError(String(e)); scheduleReadiness(2500); }
  };

  btnPlay.onclick = onPlay;
  btnStop.onclick = onStop;
  btnClear.onclick = () => { elLog.textContent = ""; };
  btnMenu.onclick = openDrawer;
  btnCloseDrawer.onclick = closeDrawer;
  overlay.onclick = closeDrawer;

  elMode.onchange = () => {
    stopReadinessPolling();
    setModePill();
    showNone();
    setReadyState(false, "Checking selected mode…", "warn");
    refreshReadiness().catch(e => { log("Mode change readiness error", String(e)); scheduleReadiness(2500); });
  };

  function scheduleReloadFromInputs(){
    stopReadinessPolling();
    setReadyState(false, "Checking event…", "warn");
    currentReadiness = null; ev = null;
    setTimeout(() => {
      loadPublic().then(refreshReadiness).catch(e => {
        log("Input change error", String(e));
        showError(String(e));
        scheduleReadiness(2500);
      });
    }, 300);
  }

  elEventId.addEventListener("input", scheduleReloadFromInputs);
  elEventKey.addEventListener("input", scheduleReloadFromInputs);

  (async () => {
    try{
      setModePill();
      await loadPublic();
      await refreshReadiness();
      updateRtcEmptyState();
    }catch(e){
      log("Initial load failed:", String(e));
      setStatus("error", "bad");
      showError(String(e));
      scheduleReadiness(2500);
    }
  })();
})();
</script>
</body>
</html>
