<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Relay Watch</title>

  <!-- Amazon IVS Player SDK (HLS) -->
  <script src="https://player.live-video.net/1.48.0/amazon-ivs-player.min.js"></script>

  <style>
    :root{
      color-scheme: dark;
      --bg:#0b0c10;
      --panel:#0f1117;
      --border:#20232a;
      --text:#e8e8e8;
      --muted:#9ca3af;
      --good:#34d399;
      --warn:#fbbf24;
      --bad:#fb7185;
      --shadow: 0 12px 40px rgba(0,0,0,.35);
    }
    *{box-sizing:border-box}
    body{ margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; background:var(--bg); color:var(--text); }

    header{
      position: sticky; top:0; z-index:10;
      background: rgba(11,12,16,.92);
      backdrop-filter: blur(8px);
      border-bottom:1px solid var(--border);
      padding: calc(10px + env(safe-area-inset-top)) 14px 10px;
      display:flex; justify-content:space-between; align-items:center; gap:12px;
    }
    .brand{ display:flex; align-items:center; gap:10px; min-width:0; }
    .logo{
      width:30px; height:30px; border-radius: 10px;
      background: linear-gradient(135deg, #334155, #111827);
      border: 1px solid #2b2f3a;
      box-shadow: 0 6px 18px rgba(0,0,0,.25);
      flex: 0 0 auto;
    }
    .titleWrap{ min-width:0; }
    .title{ font-weight:800; line-height:1.1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .subtitle{ font-size:12px; color:var(--muted); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

    .statusRow{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; justify-content:flex-end; }
    .pill{
      font-size:12px; padding:6px 10px; border:1px solid #2b2f3a; border-radius:999px; color:#cbd5e1;
      display:inline-flex; align-items:center; gap:8px; background: rgba(15,17,23,.5);
    }
    .dot{ width:8px; height:8px; border-radius:999px; background:#64748b; box-shadow: 0 0 0 3px rgba(100,116,139,.12); }
    .pill.good .dot{ background: var(--good); box-shadow: 0 0 0 3px rgba(52,211,153,.12); }
    .pill.warn .dot{ background: var(--warn); box-shadow: 0 0 0 3px rgba(251,191,36,.12); }
    .pill.bad  .dot{ background: var(--bad);  box-shadow: 0 0 0 3px rgba(251,113,133,.12); }

    main{
      padding: 14px;
      padding-bottom: calc(18px + env(safe-area-inset-bottom));
      max-width: 1100px;
      margin:0 auto;
    }

    .card{
      background: var(--panel);
      border:1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      box-shadow: var(--shadow);
    }

    .videoWrap{
      position:relative;
      background:#000;
      border-radius: 14px;
      overflow:hidden;
      border:1px solid var(--border);
    }
    video{ width:100%; display:block; background:#000; }

    .overlay{
      position:absolute; inset:0;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      text-align:center;
      padding:20px;
      background:rgba(0,0,0,.45);
      gap:10px;
    }
    .overlay.hidden{ display:none; }
    .overlayTitle{ font-size:18px; font-weight:800; }
    .overlaySub{ font-size:13px; color:#cbd5e1; max-width: 520px; line-height:1.4; }

    .spinner{
      width:28px; height:28px;
      border-radius:999px;
      border: 3px solid rgba(255,255,255,.18);
      border-top-color: rgba(255,255,255,.75);
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .statusLine{ margin-top:10px; font-size:14px; color:var(--muted); }

    details{ margin-top:14px; border:1px solid var(--border); border-radius:14px; background: rgba(15,17,23,.55); overflow:hidden; }
    summary{ cursor:pointer; padding:12px 12px; list-style:none; display:flex; justify-content:space-between; align-items:center; gap:10px; user-select:none; }
    summary::-webkit-details-marker{ display:none; }
    .diagBody{ padding: 0 12px 12px; }
    .log{
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      white-space: pre-wrap;
      background: #0b1220;
      border: 1px solid #202a3a;
      border-radius: 12px;
      padding: 10px;
      max-height: 220px;
      overflow:auto;
      color:#94a3b8;
    }
    .tiny{ font-size:12px; color:var(--muted); }
  </style>
</head>
<body>
  <header id="hdr">
    <div class="brand" id="brand">
      <div class="logo" aria-hidden="true"></div>
      <div class="titleWrap">
        <div class="title" id="hdrTitle">Relay Watch</div>
        <div class="subtitle" id="hdrSub">Loading event…</div>
      </div>
    </div>
    <div class="statusRow">
      <span id="modePill" class="pill"><span class="dot"></span><span id="modeText">HLS</span></span>
      <span id="statePill" class="pill"><span class="dot"></span><span id="stateText">LOADING</span></span>
      <span id="livePill" class="pill bad" style="display:none;"><span class="dot"></span><span>LIVE</span></span>
    </div>
  </header>

  <main>
    <div class="card">
      <div class="videoWrap">
        <video id="video" playsinline controls></video>
        <div class="overlay" id="overlay">
          <div class="spinner" aria-hidden="true"></div>
          <div class="overlayTitle" id="overlayTitle">Loading…</div>
          <div class="overlaySub" id="overlaySub">Checking event details.</div>
        </div>
      </div>

      <div class="statusLine" id="statusLine"></div>

      <details>
        <summary>
          <span class="tiny">Diagnostics</span>
          <span class="tiny" id="diagHint">hidden</span>
        </summary>
        <div class="diagBody">
          <div class="log" id="log"></div>
        </div>
      </details>
    </div>
  </main>

<script>
(() => {
  const API_BASE =
    (location.origin.includes("pages.dev") || location.origin.includes("localhost"))
      ? "https://stream-platform-api.kiwismurph.workers.dev"
      : location.origin;

  const qs = new URLSearchParams(location.search);
  const eventId = qs.get("event") || qs.get("id");
  const key = qs.get("key");
  const whiteLabel = qs.get("wl") === "1";

  const $ = (id) => document.getElementById(id);

  const elBrand = $("brand");
  const elHdrTitle = $("hdrTitle");
  const elHdrSub = $("hdrSub");

  const elModePill = $("modePill");
  const elModeText = $("modeText");
  const elStatePill = $("statePill");
  const elStateText = $("stateText");
  const elLivePill = $("livePill");

  const elOverlay = $("overlay");
  const elOverlayTitle = $("overlayTitle");
  const elOverlaySub = $("overlaySub");

  const elStatusLine = $("statusLine");
  const elLog = $("log");
  const elDiagHint = $("diagHint");
  const diagDetails = document.querySelector("details");

  const videoEl = $("video");

  let player = null;
  let retryCount = 0;
  let publicData = null;

  function apiUrl(path){ return API_BASE + path; }

  function log(...args){
    const line = args.map(a => typeof a === "string" ? a : JSON.stringify(a)).join(" ");
    elLog.textContent += line + "\n";
    elLog.scrollTop = elLog.scrollHeight;
    console.log(...args);
  }

  function setMode(text, kind){
    elModeText.textContent = text;
    elModePill.classList.remove("good","warn","bad");
    if(kind) elModePill.classList.add(kind);
  }

  function setState(text, kind){
    elStateText.textContent = text;
    elStatePill.classList.remove("good","warn","bad");
    if(kind) elStatePill.classList.add(kind);
  }

  function setLive(isLive){
    elLivePill.style.display = isLive ? "" : "none";
  }

  function showOverlay(title, sub){
    elOverlayTitle.textContent = title || "";
    elOverlaySub.textContent = sub || "";
    elOverlay.classList.remove("hidden");
  }

  function hideOverlay(){
    elOverlay.classList.add("hidden");
  }

  async function fetchPublic(){
    const r = await fetch(apiUrl(`/api/events/${encodeURIComponent(eventId)}/public?key=${encodeURIComponent(key)}`), {
      method:"GET",
      cache:"no-store",
      credentials:"include"
    });
    const t = await r.text();
    let j = null;
    try{ j = t ? JSON.parse(t) : null; }catch{}
    if(!r.ok) throw new Error(`${r.status} ${t}`);
    return j;
  }

  async function waitForPaid({ timeoutMs = 120000 } = {}){
    const started = Date.now();
    setState("PAYMENT", "warn");
    showOverlay("Payment processing…", "This usually takes about a minute. We’ll start automatically once it’s confirmed.");
    elStatusLine.textContent = "Checking payment status…";

    while(Date.now() - started < timeoutMs){
      const pub = await fetchPublic();
      publicData = pub;

      if(pub?.title) elHdrTitle.textContent = pub.title;
      elHdrSub.textContent = `Status: ${pub?.status || "unknown"}`;

      if(pub?.status === "paid") return true;

      await new Promise(r => setTimeout(r, 2000));
    }

    showOverlay("Still processing…", "Leave this page open — it should update soon.");
    return false;
  }

  async function waitForHlsReady(url, { timeoutMs = 120000 } = {}){
    const started = Date.now();
    retryCount = 0;

    setState("STARTING", "warn");
    showOverlay("Stream starting…", "Preparing video (this can take up to ~60s).");
    elStatusLine.textContent = "Checking stream availability…";

    while(Date.now() - started < timeoutMs){
      retryCount++;
      try{
        const r = await fetch(url, { method:"GET", cache:"no-store" });
        if(r.ok){
          elStatusLine.textContent = "Stream available. Loading video…";
          return true;
        }

        // Treat 404/other as “not ready yet”
        showOverlay("Stream starting…", `Preparing video… retrying in 2s (attempt ${retryCount})`);
        elStatusLine.textContent = `Preparing… (attempt ${retryCount})`;
        log("HLS probe", r.status, "attempt", retryCount);
      }catch(e){
        showOverlay("Stream starting…", `Retrying… (attempt ${retryCount})`);
        elStatusLine.textContent = `Retrying… (attempt ${retryCount})`;
        log("HLS probe error", String(e));
      }

      await new Promise(r => setTimeout(r, 2000));
    }

    setState("WAITING", "warn");
    showOverlay("Still waiting for video…", "If the broadcaster is live, this can sometimes take a little longer. Try refresh.");
    elStatusLine.textContent = "Still waiting…";
    return false;
  }

  function initPlayer(playbackUrl){
    if(!window.IVSPlayer || !IVSPlayer.isPlayerSupported){
      setState("ERROR", "bad");
      showOverlay("Browser not supported", "Try a modern Chrome/Safari/Edge.");
      return;
    }

    player = IVSPlayer.create();
    player.attachHTMLVideoElement(videoEl);

    player.addEventListener(IVSPlayer.PlayerState.PLAYING, () => {
      hideOverlay();
      setState("LIVE", "good");
      setLive(true);
      elStatusLine.textContent = "Live stream playing.";
    });

    player.addEventListener(IVSPlayer.PlayerState.BUFFERING, () => {
      setState("BUFFERING", "warn");
      showOverlay("Buffering…", "Hang tight — catching up.");
    });

    player.addEventListener(IVSPlayer.PlayerEventType.ERROR, (err) => {
      // Keep retry safety, but keep it calm.
      log("IVS Player error", err);
      setState("RETRYING", "warn");
      setLive(false);
      showOverlay("Reconnecting…", "Trying again in 2 seconds.");
      elStatusLine.textContent = "Reconnecting…";
      setTimeout(() => {
        try{ player.load(playbackUrl); player.play(); }catch(e){ log("reload fail", String(e)); }
      }, 2000);
    });

    player.load(playbackUrl);
    player.play();
  }

  async function init(){
    if(whiteLabel){
      elBrand.style.display = "none";
    }

    if(!eventId || !key){
      setState("ERROR", "bad");
      showOverlay("Missing link details", "This watch link needs an event and key.");
      return;
    }

    try{
      setState("LOADING", "warn");
      showOverlay("Loading…", "Checking event details.");
      elStatusLine.textContent = "";

      publicData = await fetchPublic();

      if(publicData?.title) elHdrTitle.textContent = publicData.title;
      elHdrSub.textContent = `Status: ${publicData?.status || "unknown"}`;

      if(publicData?.expired){
        setState("ENDED", "bad");
        showOverlay("This event has ended.", "Thanks for watching.");
        return;
      }

      if(publicData?.status !== "paid"){
        await waitForPaid({ timeoutMs: 120000 });
        publicData = await fetchPublic(); // refresh once paid
      }

      // Mode pill
      const hasHls = !!publicData?.hls_url;
      setMode(hasHls ? "HLS" : "Waiting", hasHls ? "good" : "warn");

      if(!publicData?.hls_url){
        setState("WAITING", "warn");
        showOverlay("Waiting for broadcaster…", "The stream will appear here automatically once they go live.");
        elStatusLine.textContent = "Waiting for stream…";
        return;
      }

      const ready = await waitForHlsReady(publicData.hls_url, { timeoutMs: 120000 });
      if(!ready) return;

      setState("LOADING", "warn");
      showOverlay("Loading video…", "Almost there.");
      initPlayer(publicData.hls_url);

    }catch(e){
      log("Init error", String(e));
      setState("ERROR", "bad");
      showOverlay("Unable to load stream", "Please refresh. If it keeps happening, the link may be invalid.");
      elStatusLine.textContent = "Error loading.";
    }
  }

  diagDetails.addEventListener("toggle", () => {
    elDiagHint.textContent = diagDetails.open ? "shown" : "hidden";
  });

  init();
})();
</script>
</body>
</html>
