<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Relay Watch</title>

  <!-- Amazon IVS Real-Time Web (Stage) SDK (WebRTC playback) -->
  <script src="https://web-broadcast.live-video.net/1.17.0/amazon-ivs-web-broadcast.js"></script>

  <!-- Amazon IVS Player SDK (HLS playback) -->
  <script src="https://player.live-video.net/1.48.0/amazon-ivs-player.min.js"></script>

  <style>
    body { font-family: system-ui, sans-serif; margin: 20px; }
    video { width: 100%; max-width: 900px; background: #000; border-radius: 12px; }
    .box { padding: 12px; border: 1px solid #ddd; border-radius: 12px; margin: 12px 0; }
    .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .btn {
      appearance: none; border: 1px solid #ccc; background: #fff; padding: 8px 12px;
      border-radius: 10px; cursor: pointer; font-weight: 600;
    }
    .btn[disabled] { opacity: 0.5; cursor: not-allowed; }
    .btn.primary { border-color: #222; }
    .hint { color: #555; font-size: 14px; }
    .err { color: #b00020; white-space: pre-wrap; }
    code { word-break: break-all; }
  </style>
</head>
<body>

<h1>Relay Watch</h1>

<div class="box">
  <div><b>Event:</b> <code id="eventId"></code></div>
  <div class="row" style="margin-top:8px">
    <div><b>Status:</b> <span id="status">Loading…</span></div>
    <span class="hint" id="modeHint"></span>
  </div>
  <div class="row" id="modeControls" style="margin-top:10px; display:none">
    <button class="btn primary" id="btnRtc">Low latency (WebRTC)</button>
    <button class="btn" id="btnHls">Standard (HLS)</button>
  </div>
  <div class="err" id="err"></div>
</div>

<video id="video" playsinline autoplay controls></video>

<script>
const API_BASE = "https://stream-platform-api.kiwismurph.workers.dev";

const statusEl = document.getElementById("status");
const errEl = document.getElementById("err");
const videoEl = document.getElementById("video");
const modeControlsEl = document.getElementById("modeControls");
const btnRtc = document.getElementById("btnRtc");
const btnHls = document.getElementById("btnHls");
const modeHintEl = document.getElementById("modeHint");

let currentStage = null;     // IVS Realtime Stage instance (WebRTC playback)
let currentIvsPlayer = null; // IVS Player instance (HLS playback)
let currentMode = null;      // 'rtc' | 'hls'
let lastPub = null;

let hlsRetryTimer = null;
let hlsRetryMs = 1500;
let lastPlaybackUrl = null;

function getParam(name) {
  return new URLSearchParams(location.search).get(name) || "";
}

function getEventId() {
  return getParam("event") || getParam("id") || "";
}

function clearUiError() {
  errEl.textContent = "";
  modeHintEl.textContent = "";
}

function setStatus(s) {
  statusEl.textContent = s;
}

async function fetchJson(url, opts) {
  const res = await fetch(url, opts);
  const txt = await res.text();
  let data = {};
  try { data = txt ? JSON.parse(txt) : {}; } catch { data = { raw: txt }; }
  if (!res.ok) throw new Error(`${res.status} ${JSON.stringify(data)}`);
  return data;
}

async function fetchPublic(eventId, key) {
  return await fetchJson(`${API_BASE}/api/events/${eventId}/public?key=${encodeURIComponent(key)}`);
}

async function callStart(eventId, key) {
  // IMPORTANT: starting composition/channel happens here
  return await fetchJson(`${API_BASE}/api/events/${eventId}/start?key=${encodeURIComponent(key)}`, { method: "POST" });
}

async function rtcProvision(eventId, key) {
  // Your API uses rtc/provision (not rtc/token)
  return await fetchJson(`${API_BASE}/api/events/${eventId}/rtc/provision?key=${encodeURIComponent(key)}`, { method: "POST" });
}

function getRealtimeSdk() {
  const sdk = window.IVSBroadcastClient;
  if (!sdk) return null;
  if (!sdk.Stage || !sdk.StageEvents) return null;
  return sdk;
}

function stopRtcIfRunning() {
  try {
    if (currentStage) {
      currentStage.leave();
      currentStage = null;
    }
  } catch (_) {}
}

function stopHlsIfRunning() {
  try {
    if (currentIvsPlayer) {
      currentIvsPlayer.pause();
      currentIvsPlayer.delete();
      currentIvsPlayer = null;
    }
  } catch (_) {}

  try {
    videoEl.removeAttribute("src");
    if (videoEl.srcObject) videoEl.srcObject = null;
    videoEl.load();
  } catch (_) {}

  if (hlsRetryTimer) {
    clearTimeout(hlsRetryTimer);
    hlsRetryTimer = null;
  }
  hlsRetryMs = 1500;
}

function setButtons(pub) {
  const both = !!pub?.rtc_enabled && !!pub?.hls_enabled;
  if (!both) {
    modeControlsEl.style.display = "none";
    btnRtc.disabled = true;
    btnHls.disabled = true;
    return;
  }
  modeControlsEl.style.display = "";
  btnRtc.disabled = false;
  btnHls.disabled = false;

  btnRtc.classList.toggle("primary", currentMode === "rtc");
  btnHls.classList.toggle("primary", currentMode === "hls");
}

function scheduleHlsRetry(eventId, key, reason) {
  if (currentMode !== "hls") return;
  if (hlsRetryTimer) return;

  const wait = hlsRetryMs;
  hlsRetryMs = Math.min(15000, Math.floor(hlsRetryMs * 1.6));

  setStatus(`HLS: retrying in ${Math.round(wait/100)/10}s…`);
  if (reason) modeHintEl.textContent = reason;

  hlsRetryTimer = setTimeout(async () => {
    hlsRetryTimer = null;
    try {
      clearUiError();
      await startHlsPlayback(eventId, key);
    } catch (e) {
      errEl.textContent = e?.stack || String(e);
      scheduleHlsRetry(eventId, key, "Still waiting for live HLS segments…");
    }
  }, wait);
}

async function startRtcPlayback(eventId, key) {
  stopHlsIfRunning();
  currentMode = "rtc";

  // Always refresh public state
  const pub = await fetchPublic(eventId, key);
  lastPub = pub;
  setButtons(pub);

  if (!pub.rtc_enabled) {
    setStatus("WebRTC playback not enabled for this event.");
    return;
  }

  setStatus("Provisioning WebRTC…");
  const prov = await rtcProvision(eventId, key);

  const subToken = prov?.subscriber?.token || prov?.subscriber?.participantToken || prov?.subscriber;
  if (!subToken) throw new Error(`rtc/provision missing subscriber token: ${JSON.stringify(prov)}`);

  const sdk = getRealtimeSdk();
  if (!sdk) throw new Error("IVS Realtime SDK not loaded (IVSBroadcastClient missing)");

  const strategy = {
    stageStreamsToPublish: () => [],
    shouldPublishParticipant: () => false,
    shouldSubscribeToParticipant: () => true,
  };

  const stage = new sdk.Stage(subToken, strategy);
  currentStage = stage;

  stage.on(sdk.StageEvents.STAGE_CONNECTION_STATE_CHANGED, (state) => {
    setStatus("WebRTC: " + state);
  });

  stage.on(sdk.StageEvents.STAGE_PARTICIPANT_STREAMS_ADDED, (participant, streams) => {
    let ms = videoEl.srcObject instanceof MediaStream ? videoEl.srcObject : new MediaStream();
    for (const stream of streams) {
      const t = stream.mediaStreamTrack;
      if (!t) continue;
      try { ms.addTrack(t); } catch (_) {}
    }
    videoEl.srcObject = ms;
  });

  stage.on(sdk.StageEvents.STAGE_PARTICIPANT_STREAMS_REMOVED, () => {
    try { videoEl.srcObject = null; } catch (_) {}
  });

  setStatus("Joining live stream (WebRTC)…");
  await stage.join();
  setStatus("WebRTC: Live");
}

async function startHlsPlayback(eventId, key) {
  stopRtcIfRunning();
  currentMode = "hls";

  // Ensure backend has started channel + composition.
  // This is idempotent in your API and is REQUIRED to make HLS exist.
  try {
    setStatus("Starting HLS…");
    await callStart(eventId, key);
  } catch (e) {
    // Start can fail if event not paid etc. Show but keep retry loop.
    errEl.textContent = "Start failed: " + (e?.message || String(e));
  }

  // Always refresh public after start
  const pub = await fetchPublic(eventId, key);
  lastPub = pub;
  setButtons(pub);

  if (!pub.hls_enabled) {
    setStatus("HLS playback not enabled for this event.");
    return;
  }

  const playbackUrl = pub.ivs_playback_url || pub.playback_url;
  if (!playbackUrl) {
    setStatus("HLS not ready yet… (missing playback URL)");
    scheduleHlsRetry(eventId, key, "Waiting for playback URL…");
    return;
  }

  lastPlaybackUrl = playbackUrl;

  setStatus("Loading stream (HLS)…");

  const IVSPlayer = window.IVSPlayer;
  const canUseIvsPlayer = IVSPlayer && IVSPlayer.isPlayerSupported;

  // If player already exists, just reload URL
  if (canUseIvsPlayer) {
    if (!currentIvsPlayer) {
      const player = IVSPlayer.create();
      currentIvsPlayer = player;
      player.attachHTMLVideoElement(videoEl);

      player.addEventListener(IVSPlayer.PlayerEventType.ERROR, (err) => {
        const msg = err?.message || JSON.stringify(err);
        errEl.textContent = "IVS Player error: " + msg;

        // Auto-recover from playlist issues
        if (String(msg).toLowerCase().includes("playlist") || String(msg).toLowerCase().includes("manifest")) {
          scheduleHlsRetry(eventId, key, "HLS not ready / ended — retrying…");
        }
      });

      player.addEventListener(IVSPlayer.PlayerEventType.STATE_CHANGED, (state) => {
        setStatus("HLS: " + state);
        // If it ends, retry (common if broadcaster disconnects)
        if (String(state).toLowerCase() === "ended") {
          scheduleHlsRetry(eventId, key, "Stream ended — waiting for it to resume…");
        }
      });
    }

    currentIvsPlayer.load(playbackUrl);
    currentIvsPlayer.play();
    return;
  }

  // Native HLS fallback (iOS Safari)
  videoEl.srcObject = null;
  videoEl.src = playbackUrl;
  const p = videoEl.play();
  if (p && typeof p.catch === "function") p.catch(() => {});
  setStatus("HLS: Live");
  modeHintEl.textContent = "Using native playback (your browser doesn't support the IVS player).";
}

async function main() {
  const eventId = getEventId();
  const key = getParam("key");

  document.getElementById("eventId").textContent = eventId || "(missing)";

  if (!eventId || !key) {
    setStatus("Missing eventId or key");
    return;
  }

  // First public fetch
  const pub = await fetchPublic(eventId, key);
  lastPub = pub;

  // Decide default mode
  if (pub.hls_enabled && !pub.rtc_enabled) currentMode = "hls";
  else currentMode = "rtc";

  setButtons(pub);

  btnRtc.onclick = async () => {
    try {
      clearUiError();
      await startRtcPlayback(eventId, key);
    } catch (e) {
      setStatus("Error");
      errEl.textContent = e?.stack || String(e);
    }
  };

  btnHls.onclick = async () => {
    try {
      clearUiError();
      await startHlsPlayback(eventId, key);
    } catch (e) {
      setStatus("Error");
      errEl.textContent = e?.stack || String(e);
    }
  };

  // Initial load
  if (currentMode === "hls") {
    await startHlsPlayback(eventId, key);
  } else {
    await startRtcPlayback(eventId, key);
  }
}

main().catch(err => {
  setStatus("Error");
  errEl.textContent = err?.stack || String(err);
});
</script>

</body>
</html>
